<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e3160">
    <meta name="description" content="Aplikasi Navigasi Kawasan Dinas PUPR Kabupaten Garut">
    <title>Navigasi PUPR Garut - SPA Advanced</title>
    
    <!-- Resource Preloading untuk Performa Core Web Vitals -->
    <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style">
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">

    <!-- Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Internal Styles (CSS Variables & Custom Animations) -->
    <style>
        :root {
            --pu-blue: #0e3160;
            --pu-yellow: #facc15;
            --garut-green: #15803d;
            --difabel-blue: #3b82f6;
            --sheet-height: 140px;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }

        /* 3D Map Transform based on State */
        body:not(.is-navigating) #map {
            transform: translateY(0) rotateZ(var(--map-heading, 0deg));
            transform-origin: center center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.is-navigating #map {
            transform: translateY(20vh) rotateZ(var(--map-heading, 0deg));
            transform-origin: center center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .map-dark .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }

        @keyframes dropIn { 0% { opacity: 0; margin-top: -30px; } 100% { opacity: 1; margin-top: 0; } }
        .leaflet-marker-icon:not(.user-dot-container):not(.nav-arrow-container):not(.parkir-icon) { animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton { background: #f6f7f8; background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%); background-repeat: no-repeat; background-size: 1000px 100%; animation: shimmer 1.5s infinite linear; border-radius: 4px; }

        /* Kompas & GPS Indicators */
        .user-dot-container { position: relative; display: flex; align-items: center; justify-content: center; }
        .user-dot { width: 20px; height: 20px; background-color: var(--pu-yellow); border: 3px solid var(--pu-blue); border-radius: 50%; box-shadow: 0 0 10px rgba(14, 49, 96, 0.6); position: relative; z-index: 2; }
        .user-dot::after { content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px; border: 2px solid var(--pu-yellow); border-radius: 50%; animation: pulse 2s infinite; opacity: 0; }
        .view-cone { position: absolute; width: 80px; height: 80px; background: radial-gradient(circle at 50% 100%, rgba(26,115,232,0.4) 0%, rgba(26,115,232,0) 60%); clip-path: polygon(15% 0, 85% 0, 50% 100%); transform-origin: 50% 100%; transform: translateY(-40px) rotate(0deg); z-index: 1; transition: transform 0.1s linear; }

        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        @keyframes routeFlow { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
        .route-path-animated { animation: routeFlow 1s linear infinite; filter: drop-shadow(0px 0px 4px rgba(255, 255, 255, 0.9)); }
        .nav-arrow-container { filter: drop-shadow(0px 6px 4px rgba(0,0,0,0.4)); }
        .nav-arrow-svg { width: 100%; height: 100%; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* UI Components */
        .bottom-sheet { transform: translateY(120%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform; }
        .sheet-active { transform: translateY(0); }
        .sheet-minimized { transform: translateY(calc(100% - var(--sheet-height))); }

        @media (min-width: 768px) {
            .bottom-sheet { transform: translateX(-120%); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
            .sheet-active { transform: translateX(0); }
            .sheet-minimized { transform: translateX(0); }
            #sheet-handle { display: none; }
            #instruksi-list { max-height: calc(100vh - 280px) !important; }
        }

        body.is-navigating .hide-on-nav { display: none !important; }
        body.is-navigating .show-on-nav { display: block !important; }
        .show-on-nav { display: none; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; border-radius: 4px;}
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(14, 49, 96, 0.2); border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #toast-msg { transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out; pointer-events: none; opacity: 0; transform: translate(-50%, -20px); }
        #toast-msg.show { opacity: 1; transform: translate(-50%, 0); }

        .route-chip { padding: 6px 12px; border-radius: 16px; font-size: 11px; font-weight: bold; white-space: nowrap; cursor: pointer; transition: all 0.2s; border: 1px solid #e5e7eb; }
        .route-chip.active { background-color: #0e3160; color: white; border-color: #0e3160; }
        .route-chip:not(.active) { background-color: white; color: #6b7280; }

        .leaflet-bottom.leaflet-left { margin-bottom: 160px; z-index: 900; }
        @media (min-width: 768px) { .leaflet-bottom.leaflet-left { margin-left: 420px; margin-bottom: 20px; } }
        .leaflet-popup-content-wrapper { padding: 0 !important; border-radius: 12px !important; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important; }
        .leaflet-popup-content { margin: 0 !important; width: 220px !important; }
        .leaflet-popup-close-button { color: white !important; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .custom-pin-marker { background: transparent; border: none; }

        /* Indoor Navigation Floor Control */
        .floor-control { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem; background: rgba(255,255,255,0.9); padding: 0.25rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); backdrop-filter: blur(4px); }
        .floor-btn { width: 40px; height: 40px; border-radius: 8px; font-weight: 900; font-size: 13px; color: #4b5563; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .floor-btn.active { background: #0e3160; color: white; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }

        /* Search Engine Results */
        #search-results-container { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); max-height: 250px; overflow-y: auto; z-index: 50; display: none; border: 1px solid #f3f4f6; }
        #search-results-container.active { display: block; }
        .search-item { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: #f9fafb; }

        /* AR Navigation Overlay */
        .ar-view { position: fixed; inset: 0; z-index: 9999; background: black; display: none; flex-direction: column; }
        .ar-view.active { display: flex; }
        #ar-video { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
        #ar-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.4) 100%); }
        #ar-arrow-container { perspective: 1000px; transform-style: preserve-3d; }
        #ar-arrow { font-size: 10rem; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.7)); transition: transform 0.15s ease-out; transform-origin: center center; }
        
        .fav-btn { transition: transform 0.2s, color 0.2s; }
        .fav-btn.is-fav { color: #facc15; transform: scale(1.1); filter: drop-shadow(0 2px 4px rgba(250,204,21,0.4)); }

        /* Update Animasi Antrian */
        .live-queue-update { animation: highlight-queue 0.6s ease-out; }
        @keyframes highlight-queue { 0% { background-color: #fef08a; transform: scale(1.1); } 100% { background-color: white; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Global Toast Notification -->
    <div id="toast-msg" role="alert" aria-live="assertive" class="fixed top-20 md:top-24 left-1/2 z-[3000] px-6 py-3 rounded-full text-sm font-bold text-center shadow-lg w-max max-w-[90vw]">
        Pesan Notifikasi
    </div>

    <!-- AR Video Container -->
    <div id="ar-container" class="ar-view">
        <video id="ar-video" autoplay playsinline></video>
        <div id="ar-overlay">
            <div id="ar-instruction" class="text-white text-2xl font-black text-center mb-8 drop-shadow-md px-4 bg-black/30 py-2 rounded-2xl backdrop-blur-sm">Lurus Terus</div>
            <div id="ar-arrow-container">
                <div id="ar-arrow">⬆️</div>
            </div>
            <div id="ar-dist" class="text-[#facc15] text-xl font-bold mt-8 drop-shadow-md">-- m</div>
        </div>
        <button id="btn-close-ar" class="absolute top-8 right-6 bg-white/20 backdrop-blur-md border border-white/40 text-white p-3 rounded-full font-bold z-10 shadow-lg active:scale-90" aria-label="Tutup AR">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
    </div>

    <!-- Top Navigation Overlay -->
    <header id="nav-header" class="show-on-nav absolute top-0 left-0 right-0 md:top-4 md:left-4 md:right-auto md:w-[400px] md:rounded-2xl z-[2000] bg-[#0e3160] border-b-4 md:border-b-0 text-white p-4 shadow-xl transition-all" role="banner">
        <div class="flex items-center gap-4 max-w-md mx-auto">
            <div id="nav-turn-icon" class="p-2 bg-[#facc15] text-[#0e3160] rounded-full shadow-inner flex items-center justify-center text-2xl w-12 h-12 shrink-0 transition-transform duration-300" aria-hidden="true">⬆️</div>
            <div class="flex-1 min-w-0">
                <p id="top-instruction" class="text-xl font-bold leading-tight truncate transition-colors duration-300" aria-live="polite">Mencari rute...</p>
                <p id="top-distance" class="text-sm text-[#facc15] font-semibold truncate mt-0.5">--</p>
                <div class="w-full bg-[#0a2344] rounded-full h-1.5 mt-1.5 overflow-hidden shadow-inner" aria-hidden="true">
                    <div id="nav-progress-bar" class="bg-[#facc15] h-full rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
                </div>
            </div>
            <button id="btn-stop-nav" aria-label="Hentikan Navigasi" class="shrink-0 bg-red-500 hover:bg-red-600 active:scale-95 transition-all p-2 rounded-lg text-xs font-bold uppercase tracking-wider shadow-md">Selesai</button>
        </div>
    </header>

    <!-- UI Pencarian & Filter -->
    <div class="hide-on-nav absolute top-3 left-3 right-3 md:top-4 md:left-4 md:right-auto md:w-[400px] z-[1000] mx-auto md:mx-0 flex flex-col gap-2 animate-fade-in-up" style="animation-delay: 100ms;">
        <div class="bg-white rounded-3xl shadow-lg flex flex-col border border-gray-100 focus-within:ring-2 focus-within:ring-[#0e3160] transition-all duration-300 overflow-visible relative">
            <div class="flex relative">
                <div class="flex flex-col items-center w-12 pt-5 pb-3">
                    <div class="w-3 h-3 rounded-full border-2 border-[#1a73e8] bg-blue-50 z-10"></div>
                    <div class="w-0.5 grow bg-gray-200 my-1"></div>
                    <div class="w-3 h-3 rounded-full bg-red-500 z-10"></div>
                </div>

                <div class="flex-1 flex flex-col justify-center pr-3 py-1 min-w-0">
                    <div class="border-b border-gray-100 py-2 min-w-0">
                        <select id="select-asal" aria-label="Pilih lokasi awal" class="w-full bg-transparent outline-none text-gray-600 font-medium text-[13px] sm:text-sm appearance-none truncate cursor-pointer transition-colors">
                            <option value="gps" selected>📍 Lokasi Saat Ini (GPS)</option>
                        </select>
                    </div>
                    <div class="py-2 min-w-0 flex items-center relative">
                        <input type="text" id="input-search-tujuan" placeholder="Cari layanan, loket, fasilitas..." autocomplete="off" class="flex-1 w-full bg-transparent outline-none text-[#0e3160] font-bold text-sm sm:text-base truncate transition-colors placeholder:font-normal placeholder:text-gray-400">
                    </div>
                </div>

                <div class="w-14 flex flex-col items-center justify-center border-l border-gray-100 bg-gray-50/50 shrink-0 rounded-tr-3xl" aria-hidden="true">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Lambang_Kabupaten_Garut.png/512px-Lambang_Kabupaten_Garut.png" onerror="this.style.display='none'" class="h-7 w-7 object-contain drop-shadow-sm transition-transform hover:scale-110" alt="Logo Garut">
                </div>
            </div>
            
            <!-- Modal Dropdown Search Results -->
            <ul id="search-results-container" class="custom-scroll"></ul>

            <!-- MODIFIED: Pemilih Moda Transportasi Ditambah Akses Difabel -->
            <div class="flex bg-gray-100 p-1.5 gap-1 border-t border-gray-200 rounded-b-3xl" id="mode-selector" role="group" aria-label="Pilihan Moda Transportasi">
                <button onclick="window.puprApp.setTransportMode('jalan_kaki')" id="btn-mode-jalan_kaki" aria-label="Moda Jalan Kaki" class="flex-1 py-1.5 text-[10px] sm:text-[11px] font-bold rounded-2xl bg-[#0e3160] text-white transition-all shadow-sm truncate">🚶‍♂️ Jalan</button>
                <button onclick="window.puprApp.setTransportMode('kursi_roda')" id="btn-mode-kursi_roda" aria-label="Moda Difabel Kursi Roda" class="flex-1 py-1.5 text-[10px] sm:text-[11px] font-bold rounded-2xl text-gray-500 hover:bg-gray-200 transition-all truncate text-blue-600">♿ Difabel</button>
                <button onclick="window.puprApp.setTransportMode('motor')" id="btn-mode-motor" aria-label="Moda Sepeda Motor" class="flex-1 py-1.5 text-[10px] sm:text-[11px] font-bold rounded-2xl text-gray-500 hover:bg-gray-200 transition-all truncate">🏍️ Motor</button>
                <button onclick="window.puprApp.setTransportMode('mobil')" id="btn-mode-mobil" aria-label="Moda Mobil" class="flex-1 py-1.5 text-[10px] sm:text-[11px] font-bold rounded-2xl text-gray-500 hover:bg-gray-200 transition-all truncate">🚗 Mobil</button>
            </div>
        </div>

        <div class="flex overflow-x-auto hide-scrollbar gap-2 px-1 pb-1 mt-1" role="group" aria-label="Filter Kategori Cepat">
            <!-- Filter Ditambah Kategori Pelayanan -->
            <button onclick="window.puprApp.showFavorites()" aria-label="Tampilkan Favorit" class="shrink-0 bg-white/90 backdrop-blur border border-gray-200 shadow-sm rounded-full px-3 py-1.5 text-[11px] sm:text-xs font-semibold text-yellow-600 hover:bg-yellow-50 active:scale-95 transition-all flex items-center gap-1">⭐ Favorit</button>
            <button onclick="window.puprApp.searchCategory('Pelayanan')" class="shrink-0 bg-[#8b5cf6] border border-purple-500 shadow-sm rounded-full px-3 py-1.5 text-[11px] sm:text-xs font-semibold text-white hover:bg-purple-700 active:scale-95 transition-all flex items-center gap-1">📝 Pelayanan</button>
            <button onclick="window.puprApp.searchCategory('Toilet')" class="shrink-0 bg-white/90 backdrop-blur border border-gray-200 shadow-sm rounded-full px-3 py-1.5 text-[11px] sm:text-xs font-semibold text-[#0e3160] hover:bg-[#0e3160] hover:text-white active:scale-95 transition-all flex items-center gap-1">🚻 Toilet</button>
            <button onclick="window.puprApp.searchCategory('Kantin')" class="shrink-0 bg-white/90 backdrop-blur border border-gray-200 shadow-sm rounded-full px-3 py-1.5 text-[11px] sm:text-xs font-semibold text-[#0e3160] hover:bg-[#0e3160] hover:text-white active:scale-95 transition-all flex items-center gap-1">☕ Kantin</button>
        </div>
    </div>

    <!-- Peta Utama -->
    <div id="map-wrapper" class="absolute inset-0 overflow-hidden z-[1] bg-[#e5e7eb]">
        <main id="map" role="region" aria-label="Peta Navigasi Interaktif" class="absolute w-[130vmax] h-[130vmax] -left-[15vmax] -top-[15vmax]"></main>
    </div>

    <!-- Indoor Floor Control -->
    <div class="floor-control hide-on-nav">
        <button id="btn-floor-l2" class="floor-btn" onclick="window.puprApp.setFloor('Lantai 2')">L2</button>
        <button id="btn-floor-l1" class="floor-btn" onclick="window.puprApp.setFloor('Lantai 1')">L1</button>
        <button id="btn-floor-od" class="floor-btn" onclick="window.puprApp.setFloor('Outdoor')">OD</button>
        <button id="btn-floor-all" class="floor-btn active" onclick="window.puprApp.setFloor('Semua')">ALL</button>
    </div>

    <!-- Tombol Fokus Kembali -->
    <button id="btn-recenter" aria-label="Fokuskan kembali ke lokasi saat ini" class="hidden absolute bottom-44 md:bottom-12 left-1/2 -translate-x-1/2 z-[2000] rounded-full bg-[#1a73e8] px-4 py-2.5 shadow-[0_4px_15px_rgba(26,115,232,0.4)] items-center justify-center gap-2 text-white font-bold text-sm hover:bg-blue-700 active:scale-90 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 22v-4M12 2V6M22 12h-4M2 12h4M12 15a3 3 0 100-6 3 3 0 000 6z" /></svg>
        Kembali ke Lokasi
    </button>

    <!-- Tombol Aksi Kanan Bawah -->
    <div class="absolute bottom-6 right-4 md:bottom-8 md:right-8 z-[1000] flex flex-col gap-3 animate-fade-in-up" style="animation-delay: 300ms;">
        <button id="btn-ar-mode" class="show-on-nav w-12 h-12 rounded-full bg-[#8b5cf6] shadow-[0_4px_15px_rgba(139,92,246,0.5)] items-center justify-center text-white hover:bg-purple-700 active:scale-90 transition-transform duration-200" aria-label="Mulai AR Navigasi">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
        </button>

        <button id="btn-location" class="hide-on-nav w-12 h-12 rounded-full bg-white shadow-lg flex items-center justify-center text-red-500 hover:bg-gray-50 active:scale-90 transition-transform duration-200" aria-label="Perbarui Lokasi GPS">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </button>
        <button id="btn-search-focus" class="hide-on-nav w-14 h-14 rounded-full bg-[#facc15] shadow-[0_4px_15px_rgba(250,204,21,0.5)] flex items-center justify-center text-[#0e3160] hover:bg-yellow-300 active:scale-90 hover:-translate-y-1 transition-all duration-200" aria-label="Buka Pencarian Tujuan">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
        </button>
    </div>

    <!-- Panel Informasi Lokasi (Bottom Sheet) -->
    <aside id="info-sheet" role="dialog" aria-labelledby="sheet-title" class="bottom-sheet absolute bottom-0 left-0 right-0 md:bottom-4 md:left-4 md:w-[400px] md:right-auto bg-white z-[1100] rounded-t-3xl md:rounded-3xl shadow-[0_-4px_25px_rgba(14,49,96,0.15)] md:shadow-[4px_4px_25px_rgba(14,49,96,0.15)] mx-auto border-t-[6px] md:border-t-0 md:border-l-[6px] border-[#0e3160] flex flex-col" aria-hidden="true">
        <div id="sheet-handle" role="button" aria-label="Tarik Panel Navigasi" class="w-full flex justify-center py-4 cursor-pointer hover:bg-gray-50 transition-colors rounded-t-3xl md:rounded-t-3xl" tabindex="0" onclick="window.puprApp.toggleSheet()">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full transition-transform hover:scale-x-110"></div>
        </div>
        <div class="px-6 pb-8">
            <div class="flex justify-between items-start mb-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <h2 id="sheet-title" class="text-2xl font-black text-[#0e3160] leading-tight transition-all truncate">Nama Lokasi</h2>
                        <button id="btn-toggle-fav" class="fav-btn text-2xl text-gray-300 shrink-0" aria-label="Tambah ke Favorit">⭐</button>
                    </div>
                    <p id="sheet-meta" class="mt-1 transition-all">-- meter • -- menit</p>
                </div>
                <button id="btn-close-sheet" aria-label="Tutup Panel" class="p-2 bg-gray-100 hover:bg-gray-200 hover:rotate-90 active:scale-90 rounded-full text-gray-500 transition-all duration-300 ml-2 shrink-0">

    <script>
        "use strict";

        const Utils = {

                if (!str) return '';
                return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
            }
        };

        function debounce(fn, wait = 800) {
            let t;
            return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), wait); };
        }

        const APP_DATA = {

            ROUTES_GEOJSON: {

                    { "type": "Feature", "properties": { "tipe": "jalan_kaki" }, "geometry": { "type": "LineString", "coordinates": [[107.877238,-7.199308],[107.877280,-7.199266],[107.877317,-7.199134],[107.877424,-7.199082],[107.877340,-7.198996],[107.877344,-7.198904],[107.877322,-7.198768],[107.877255,-7.198679],[107.877122,-7.198641],[107.876883,-7.198654]] } }
                ]
            }
        };

        class PuprNavigationApp {
            constructor(data) {
                this.DATA = data;
                
                this.state = { 
                    map: null, userMarker: null, routeLayers: [], poiLayer: null,
                    currentTarget: null, currentRouteSegments: [], currentParking: null,
                    userPos: [...this.DATA.PUSAT_KAWASAN], isNavigating: false, sheetState: 'closed',
                    currentHeading: 0, graph: new Map(), nodes: [], transportMode: 'jalan_kaki',
                    isManualStart: false, manualStartTarget: null, isCameraLocked: true,
                    lastOffRouteWarn: 0, turnInstructions: [], compassHeading: 0, needsRecalculation: false,
                    initialRouteDistance: 0, availableRoutes: [], selectedRouteIndex: 0,
                    favorites: JSON.parse(localStorage.getItem('pupr_favorites') || '[]'),
                    currentFloor: 'Semua', isARMode: false
                };

                this.watchId = null;
                this.queueIntervalId = null;
                this.calculateCustomRouteThrottled = debounce(this.calculateCustomRoute.bind(this), 1000);

                this.DOM = {
                    body: document.body,
                    selectAsal: document.getElementById('select-asal'),
                    inputSearchTujuan: document.getElementById('input-search-tujuan'),
                    searchResultsContainer: document.getElementById('search-results-container'),
                    btnToggleFav: document.getElementById('btn-toggle-fav'),
                    btnFloorBtns: document.querySelectorAll('.floor-btn'),
                    arContainer: document.getElementById('ar-container'),
                    arVideo: document.getElementById('ar-video'),
                    arArrow: document.getElementById('ar-arrow'),
                    arInstruction: document.getElementById('ar-instruction'),
                    arDist: document.getElementById('ar-dist'),
                    btnArMode: document.getElementById('btn-ar-mode'),
                    btnCloseAr: document.getElementById('btn-close-ar'),
                    sheet: document.getElementById('info-sheet'),
                    sheetTitle: document.getElementById('sheet-title'),
                    sheetMeta: document.getElementById('sheet-meta'),
                    routeOptionsContainer: document.getElementById('route-options-container'),
                    instruksiList: document.getElementById('instruksi-list'),
                    topInstruction: document.getElementById('top-instruction'),
                    topDistance: document.getElementById('top-distance'),
                    navTurnIcon: document.getElementById('nav-turn-icon'),
                    navProgressBar: document.getElementById('nav-progress-bar'),
                    btnLocation: document.getElementById('btn-location'),
                    btnSearchFocus: document.getElementById('btn-search-focus'),
                    btnStartNav: document.getElementById('btn-start-nav'),
                    btnStopNav: document.getElementById('btn-stop-nav'),
                    btnCloseSheet: document.getElementById('btn-close-sheet'),
                    btnRecenter: document.getElementById('btn-recenter'),
                    toast: document.getElementById('toast-msg')
                };

                this.init();
            }

            init() {
                this.setupIcons();
                this.checkDarkMode(); 
                this.setupMap();
                this.buildRoutingGraph(); 
                this.populateSearchDropdown();
                this.setupEventListeners();
                this.unlockAudioEngine(); 
                this.requestGeolocation();
                this.checkUrlParams();
                this.simulateQueues(); // Mulai simulasi antrian
            }

            setupIcons() {
                this.icons = {
                    idle: L.divIcon({ className: 'user-dot-container', html: `<div class="view-cone" id="user-view-cone"></div><div class="user-dot"></div>`, iconSize: [80, 80], iconAnchor: [40, 40], zIndexOffset: 1000 }),
                    navigating: L.divIcon({ className: 'nav-arrow-container', html: `<svg viewBox="0 0 32 32" fill="none" class="nav-arrow-svg"><path d="M16 2 L30 28 L16 22 L2 28 Z" fill="#1a73e8" stroke="white" stroke-width="2.5" stroke-linejoin="round"/></svg>`, iconSize: [44, 44], iconAnchor: [22, 22], zIndexOffset: 1000 }),
                    parking: L.divIcon({ className: 'parkir-icon', html: `<div style="background-color:#1a73e8; color:white; width:26px; height:26px; border-radius:50%; text-align:center; line-height:26px; font-weight:900; font-size:14px; border:2px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">P</div>`, iconSize: [26, 26], iconAnchor: [13, 13] })
                };
            }

            checkUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const targetId = params.get('tujuan');
                if (targetId) setTimeout(() => { this.handleLocationSelect(targetId); }, 800);
            }

            requestDeviceOrientation() {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(state => {
                        if (state === 'granted') window.addEventListener('deviceorientation', this.handleCompass.bind(this), true);
                    }).catch(console.error);
                } else {
                    window.addEventListener('deviceorientationabsolute', this.handleCompass.bind(this), true);
                    window.addEventListener('deviceorientation', this.handleCompass.bind(this), true);
                }
            }

            handleCompass(e) {
                let compass = e.webkitCompassHeading || Math.abs(e.alpha - 360);
                if (compass) {
                    this.state.compassHeading = compass;
                    const cone = document.getElementById('user-view-cone');
                    if (cone) cone.style.transform = `translateY(-40px) rotate(${compass}deg)`;

                    if (this.state.isARMode && this.state.isNavigating) {
                        const targetPt = this.getHeadingTarget(this.state.userPos);
                        const userPtGeo = turf.point([this.state.userPos[1], this.state.userPos[0]]);
                        const targetPtGeo = turf.point([targetPt[1], targetPt[0]]);
                        const bearing = turf.bearing(userPtGeo, targetPtGeo);
                        
                        let arrowRot = bearing - this.state.compassHeading;
                        if (this.DOM.arArrow) this.DOM.arArrow.style.transform = `rotate(${arrowRot}deg) rotateX(45deg)`;
                    }
                }
            }

            unlockAudioEngine() {
                const unlock = () => { window.speechSynthesis.speak(new SpeechSynthesisUtterance('')); document.removeEventListener('click', unlock); };
                document.addEventListener('click', unlock, { once: true });
            }

            showToast(message, type = 'error') {
                this.DOM.toast.textContent = Utils.escapeHTML(message);
                const baseClass = "fixed top-20 md:top-24 left-1/2 z-[3000] px-6 py-3 rounded-full text-sm font-bold text-center shadow-lg w-max max-w-[90vw] text-white transition-all duration-300";
                this.DOM.toast.className = `${baseClass} ${type === 'error' ? 'bg-red-600' : 'bg-[#15803d]'}`;
                this.DOM.toast.classList.add('show');
                setTimeout(() => this.DOM.toast.classList.remove('show'), 4000);
            }

            checkDarkMode() {
                if (new Date().getHours() >= 18 || new Date().getHours() < 6) {
                    document.documentElement.classList.add('dark-theme-active');
                    setTimeout(() => { if(document.getElementById('map')) document.getElementById('map').classList.add('map-dark'); }, 500);
                }
            }

            setTransportMode(mode) {
                this.state.transportMode = mode;
                const inactiveClass = ['text-gray-500', 'hover:bg-gray-200'];
                // Update active state visual
                ['jalan_kaki', 'kursi_roda', 'motor', 'mobil'].forEach(m => {
                    const btn = document.getElementById(`btn-mode-${m}`);
                    if(btn) {
                        const isAccessible = m === 'kursi_roda';
                        const activeBg = isAccessible ? 'bg-blue-600' : 'bg-[#0e3160]';
                        btn.className = `flex-1 py-1.5 text-[10px] sm:text-[11px] font-bold rounded-2xl transition-all truncate ${m === mode ? `${activeBg} text-white shadow-sm` : inactiveClass.join(' ')}`;
                        if(isAccessible && m !== mode) btn.classList.add('text-blue-600');
                    }
                });
                if (this.state.currentTarget) this.calculateCustomRoute();
            }

            setFloor(floorName) {
                this.state.currentFloor = floorName;
                this.DOM.btnFloorBtns.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.textContent.trim().toUpperCase() === (floorName === 'Semua' ? 'ALL' : (floorName === 'Lantai 1' ? 'L1' : (floorName === 'Lantai 2' ? 'L2' : 'OD')))) {
                        btn.classList.add('active');
                    }
                });
                this.renderPOIs();
            }

            setupMap() {
                const openStreetMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22, maxNativeZoom: 19, attribution: '© <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>', keepBuffer: 8, updateWhenIdle: false });
                this.state.map = L.map('map', { zoomControl: false, attributionControl: false, zoomSnap: 0.5, layers: [openStreetMap] }).setView(this.state.userPos, 20);
                L.control.attribution({position: 'bottomleft', prefix: false}).addTo(this.state.map);
                this.state.userMarker = L.marker(this.state.userPos, { icon: this.icons.idle }).addTo(this.state.map);
                this.state.poiLayer = L.layerGroup().addTo(this.state.map);
                this.renderPOIs();
            }

            renderPOIs() {
                this.state.poiLayer.clearLayers();

                const drawPOI = (loc) => {
                    if (this.state.currentFloor !== 'Semua' && loc.floor !== this.state.currentFloor) return;

                    let iconType = loc.cat;
                    if (loc.name.includes('Kantin')) iconType = 'Kantin';
                    else if (loc.name.includes('Mushala')) iconType = 'Mushala';
                    else if (loc.name.includes('Toilet')) iconType = 'Toilet';
                    else if (loc.name.includes('Perpus')) iconType = 'Perpus';
                    else if (loc.type === 'mobil') iconType = 'ParkirMobil';
                    else if (loc.type === 'motor') iconType = 'ParkirMotor';

                    L.marker([loc.lat, loc.lng], { icon: this.createCustomMarker(iconType) })
                      .addTo(this.state.poiLayer)
                      .bindPopup(this.generatePopupElement(loc), { closeButton: true, autoClose: false });
                };

                this.DATA.LOCATIONS.forEach(drawPOI);
                this.DATA.PARKIRAN.forEach(park => {
                    park.cat = 'Parkiran'; park.img = 'https://images.unsplash.com/photo-1506521781263-d8422e82f27a?w=300&q=80';
                    drawPOI(park);
                });
            }

            populateSearchDropdown(query = '') {
                const container = this.DOM.searchResultsContainer;
                container.innerHTML = '';
                const q = query.toLowerCase().trim();
                
                const allPlaces = [...this.DATA.LOCATIONS, ...this.DATA.PARKIRAN];
                let results = [];

                if (q === '') {
                    results = allPlaces.filter(p => this.state.favorites.includes(p.id));
                    if (results.length > 0) {
                        const header = document.createElement('div');
                        header.className = 'px-4 py-2 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wider';
                        header.textContent = '⭐ Lokasi Favorit';
                        container.appendChild(header);
                    }
                } else {
                    results = allPlaces.filter(p => 
                        p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q) || (p.floor && p.floor.toLowerCase().includes(q))
                    );
                }

                if (results.length === 0 && q !== '') {
                    const div = document.createElement('div'); div.className = 'p-4 text-sm text-gray-500 text-center'; div.textContent = 'Tidak ditemukan.';
                    container.appendChild(div);
                } else {
                    results.forEach(loc => {
                        const item = document.createElement('div'); item.className = 'search-item';
                        item.innerHTML = `
                            <div class="text-xl shrink-0">${loc.cat === 'Parkiran' ? '🅿️' : (loc.cat === 'Pelayanan' ? '📝' : (loc.cat === 'Fasilitas' ? '📍' : '🏢'))}</div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm font-bold text-[#0e3160] truncate">${Utils.escapeHTML(loc.name)}</div>
                                <div class="text-xs text-gray-500 truncate">${Utils.escapeHTML(loc.cat)} • ${Utils.escapeHTML(loc.floor)}</div>
                            </div>
                        `;
                        item.addEventListener('click', () => {
                            this.DOM.inputSearchTujuan.value = loc.name;
                            this.handleLocationSelect(loc.id);
                            container.classList.remove('active');
                        });
                        container.appendChild(item);
                    });
                }
            }

            searchCategory(catName) {
                this.DOM.inputSearchTujuan.value = catName;
                this.populateSearchDropdown(catName);
                this.DOM.searchResultsContainer.classList.add('active');
            }

            showFavorites() {
                this.DOM.inputSearchTujuan.value = '';
                this.populateSearchDropdown('');
                this.DOM.searchResultsContainer.classList.add('active');
            }

            toggleFavorite(id) {
                const idx = this.state.favorites.indexOf(id);
                if (idx > -1) {
                    this.state.favorites.splice(idx, 1);
                    this.showToast("Dihapus dari Favorit", "success");
                } else {
                    this.state.favorites.push(id);
                    this.showToast("Ditambahkan ke Favorit", "success");
                }
                localStorage.setItem('pupr_favorites', JSON.stringify(this.state.favorites));
                if (this.state.currentTarget && this.state.currentTarget.id === id) {
                    this.DOM.btnToggleFav.classList.toggle('is-fav', idx === -1);
                }
            }

            toggleARMode() {
                if(this.state.isARMode) this.stopAR(); else this.startAR();
            }

            async startAR() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    this.DOM.arVideo.srcObject = stream;
                    this.DOM.arContainer.classList.add('active');
                    this.state.isARMode = true;
                    this.requestDeviceOrientation();
                } catch(e) {
                    this.showToast("Kamera tidak diizinkan atau tidak didukung perangkat.", "error");
                }
            }

            stopAR() {
                const stream = this.DOM.arVideo.srcObject;
                if(stream) stream.getTracks().forEach(t => t.stop());
                this.DOM.arVideo.srcObject = null;
                this.DOM.arContainer.classList.remove('active');
                this.state.isARMode = false;
            }

            // [FITUR BARU] Simulasi Integrasi Antrian Real-Time
            simulateQueues() {
                this.queueIntervalId = setInterval(() => {
                    this.DATA.LOCATIONS.forEach(loc => {
                        if (loc.queue !== undefined) {
                            const change = Math.floor(Math.random() * 3) - 1; // -1 to 1
                            loc.queue = Math.max(0, Math.min(50, loc.queue + change));
                            
                            const badge = document.querySelector(`.live-queue-badge[data-id="${loc.id}"]`);
                            if (badge) {
                                badge.textContent = `${loc.queue} Orang`;
                                badge.classList.add('live-queue-update');
                                setTimeout(() => badge.classList.remove('live-queue-update'), 600);
                            }
                        }
                    });
                }, 5000);
            }

            buildRoutingGraph() {
                const points = [];
                this.DATA.ROUTES_GEOJSON.features.forEach((feature) => {
                    const coords = feature.geometry.coordinates; // [Lng, Lat]
                    const tipeJalan = feature.properties.tipe;

                    for (let i = 0; i < coords.length; i++) {
                        const pt = coords[i];
                        const id = `${pt[0]},${pt[1]}`; 
                        
                        points.push({ id, coord: pt, type: tipeJalan });
                        if (!this.state.graph.has(id)) this.state.graph.set(id, []);

                        if (i > 0) {
                            const prevPt = coords[i-1];
                            const prevId = `${prevPt[0]},${prevPt[1]}`;
                            const dist = turf.distance(pt, prevPt, {units: 'meters'});

                            this.state.graph.get(id).push({ node: prevId, weight: dist, type: tipeJalan });
                            this.state.graph.get(prevId).push({ node: id, weight: dist, type: tipeJalan });
                        }
                    }
                });

                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        if (points[i].id === points[j].id) continue;
                        const dist = turf.distance(points[i].coord, points[j].coord, {units: 'meters'});
                        if (dist < 5.0) { 
                            this.state.graph.get(points[i].id).push({ node: points[j].id, weight: dist, type: 'jalan_kaki' });
                            this.state.graph.get(points[j].id).push({ node: points[i].id, weight: dist, type: 'jalan_kaki' });
                        }
                    }
                }
                this.state.nodes = points; 
            }

            getNearestNodeId(coordLngLat) {
                let nearest = null; let minDist = Infinity;
                this.state.nodes.forEach(pt => {
                    const dist = turf.distance(coordLngLat, pt.coord, {units: 'meters'});
                    if (dist < minDist) { minDist = dist; nearest = pt.id; }
                });
                return nearest;
            }

            findShortestPath(startLngLat, endLngLat, mode, weightType = 'time', avoidNodeId = null) {
                const startId = this.getNearestNodeId(startLngLat);
                const endId = this.getNearestNodeId(endLngLat);
                if (!startId || !endId || startId === endId) return [];

                const distances = new Map();
                const previous = new Map();
                const queue = []; 

                this.state.graph.forEach((_, node) => {
                    distances.set(node, Infinity); previous.set(node, null);
                });

                distances.set(startId, 0); queue.push({ node: startId, dist: 0 });

                while (queue.length > 0) {
                    queue.sort((a, b) => a.dist - b.dist);
                    const current = queue.shift().node;
                    if (current === endId) break;

                    const neighbors = this.state.graph.get(current);
                    for (let neighbor of neighbors) {
                        if (neighbor.node === avoidNodeId) continue;
                        let speed = 1.4;
                        if (mode === 'mobil') {
                            if (neighbor.type === 'mobil') speed = 5.5; 
                            else if (neighbor.type === 'motor') speed = 0.001;
                        } else if (mode === 'motor') {
                            if (neighbor.type === 'mobil' || neighbor.type === 'motor') speed = 5.5;
                        } else if (mode === 'kursi_roda') {
                            // [FITUR BARU] Asumsi kecepatan difabel sedikit lebih lambat 1.0 m/s
                            speed = 1.0;
                        }

                        let timeCost = weightType === 'distance' ? neighbor.weight : (neighbor.weight / speed); 
                        const alt = distances.get(current) + timeCost;
                        
                        if (alt < distances.get(neighbor.node)) {
                            distances.set(neighbor.node, alt);
                            previous.set(neighbor.node, { node: current, type: neighbor.type });
                            queue.push({ node: neighbor.node, dist: alt });
                        }
                    }
                }

                if (distances.get(endId) === Infinity) return [];
                const pathSegments = []; let curr = endId;
                while (curr !== startId) {
                    const prevObj = previous.get(curr);
                    if(!prevObj) break;
                    const p1 = prevObj.node.split(',').map(Number);
                    const p2 = curr.split(',').map(Number);
                    pathSegments.unshift({ start: [p1[1], p1[0]], end: [p2[1], p2[0]], type: prevObj.type });
                    curr = prevObj.node;
                }
                return pathSegments;
            }

            createCustomMarker(type) {
                let iconStr = '📍', colorClass = 'bg-[#0e3160]', tailColor = 'border-t-[#0e3160]';
                if (type === 'Kantin') { iconStr = '☕'; colorClass = 'bg-[#d97706]'; tailColor = 'border-t-[#d97706]'; }
                else if (type === 'Mushala') { iconStr = '🕌'; colorClass = 'bg-[#10b981]'; tailColor = 'border-t-[#10b981]'; }
                else if (type === 'Toilet') { iconStr = '🚻'; colorClass = 'bg-[#0ea5e9]'; tailColor = 'border-t-[#0ea5e9]'; }
                else if (type === 'Perpus') { iconStr = '📚'; colorClass = 'bg-[#6366f1]'; tailColor = 'border-t-[#6366f1]'; }
                else if (type === 'Gerbang') { iconStr = '🚪'; colorClass = 'bg-[#ef4444]'; tailColor = 'border-t-[#ef4444]'; }
                else if (type === 'ParkirMobil') { iconStr = '🚗'; colorClass = 'bg-[#3b82f6]'; tailColor = 'border-t-[#3b82f6]'; }
                else if (type === 'ParkirMotor') { iconStr = '🏍️'; colorClass = 'bg-[#8b5cf6]'; tailColor = 'border-t-[#8b5cf6]'; }
                else if (type === 'Pelayanan') { iconStr = '📝'; colorClass = 'bg-[#8b5cf6]'; tailColor = 'border-t-[#8b5cf6]'; }
                else if (['Gedung', 'Ruangan', 'Bidang', 'UPT'].includes(type)) { iconStr = '🏢'; colorClass = 'bg-[#0e3160]'; tailColor = 'border-t-[#0e3160]'; }

                const html = `<div class="relative flex items-center justify-center w-8 h-8 rounded-full border-[2.5px] border-white shadow-md ${colorClass} hover:scale-110 transition-transform z-10"><span class="text-sm leading-none drop-shadow-sm">${iconStr}</span><div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-r-[6px] border-t-[8px] border-l-transparent border-r-transparent ${tailColor}"></div></div>`;
                return L.divIcon({ className: 'custom-pin-marker', html: html, iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -40] });
            }

                img.src = loc.img || ''; img.alt = loc.name || '';
                img.className = 'w-full h-[100px] object-cover rounded-t-[12px] m-0';
                img.onerror = () => { img.src = 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=300&q=80'; };

                const info = document.createElement('div');
                info.className = 'p-3 bg-white rounded-b-[12px]';
                
                const h3 = document.createElement('h3');
                h3.className = 'font-bold text-[#0e3160] text-[15px] leading-tight mb-1';
                h3.textContent = loc.name || '';

                const floor = document.createElement('div');
                floor.className = 'flex items-center gap-1 text-gray-500 text-[11px] mb-1';
                floor.textContent = `📍 ${loc.floor || ''}`;

                const hours = document.createElement('div');
                hours.className = 'flex items-center gap-1 text-gray-500 text-[11px] mb-3';
                hours.textContent = `🕒 ${loc.hours || ''}`;

                // [FITUR BARU] Tampilkan Badge Antrian jika ada data queue
                if (loc.queue !== undefined) {
                    const queueDiv = document.createElement('div');
                    queueDiv.className = 'mt-2 mb-3 p-2 bg-blue-50 border border-blue-100 rounded-lg flex justify-between items-center';
                    queueDiv.innerHTML = `<span class="text-[10px] font-bold text-blue-800 uppercase tracking-wider">Antrian Live</span><span class="text-sm font-black text-blue-600 bg-white px-2 py-0.5 rounded shadow-sm live-queue-badge transition-colors" data-id="${loc.id}">${loc.queue} Orang</span>`;
                    info.appendChild(queueDiv);
                }

                const btn = document.createElement('button');
                btn.className = 'w-full bg-[#15803d] hover:bg-green-700 text-white font-bold py-1.5 rounded-lg text-xs shadow-sm transition-colors cursor-pointer';
                btn.setAttribute('aria-label', `Arahkan ke ${loc.name || ''}`);
                btn.textContent = 'Arahkan ke Sini';
