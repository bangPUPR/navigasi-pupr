                if (loc.queue === undefined) { info.append(h3, floor, hours, btn); } 
                else { info.insertBefore(h3, info.firstChild); info.insertBefore(floor, info.children[1]); info.insertBefore(hours, info.children[2]); info.appendChild(btn); }
                
                container.append(img, info);
                return container;
            }

            setupEventListeners() {
                this.DOM.inputSearchTujuan.addEventListener('focus', () => { this.DOM.searchResultsContainer.classList.add('active'); this.populateSearchDropdown(this.DOM.inputSearchTujuan.value); });
                this.DOM.inputSearchTujuan.addEventListener('input', (e) => { this.populateSearchDropdown(e.target.value); });
                
                document.addEventListener('click', (e) => {
                    if (!this.DOM.inputSearchTujuan.contains(e.target) && !this.DOM.searchResultsContainer.contains(e.target)) {
                        this.DOM.searchResultsContainer.classList.remove('active');
                    }
                });

                this.DOM.btnToggleFav.addEventListener('click', () => {
                    if(this.state.currentTarget) this.toggleFavorite(this.state.currentTarget.id);
                });

                this.DOM.btnArMode.addEventListener('click', () => this.toggleARMode());
                this.DOM.btnCloseAr.addEventListener('click', () => this.stopAR());

                this.DOM.selectAsal.addEventListener('change', (e) => this.handleStartSelect(e.target.value));
                this.DOM.btnLocation.addEventListener('click', () => this.focusUserLocation());
                this.DOM.btnSearchFocus.addEventListener('click', () => { this.DOM.inputSearchTujuan.focus(); });
                this.DOM.btnStartNav.addEventListener('click', () => this.startNavigation());
                this.DOM.btnStopNav.addEventListener('click', () => this.stopNavigation());
                this.DOM.btnCloseSheet.addEventListener('click', () => this.updateSheetState('closed'));
                
                this.state.map.on('dragstart', () => {
                    if (this.state.isNavigating && this.state.isCameraLocked) {
                        this.state.isCameraLocked = false;
                        this.DOM.btnRecenter.classList.remove('hidden');
                        this.DOM.btnRecenter.classList.add('flex');
                    }
                });

                this.DOM.btnRecenter.addEventListener('click', () => {
                    this.state.isCameraLocked = true;
                    this.DOM.btnRecenter.classList.add('hidden');
                    this.DOM.btnRecenter.classList.remove('flex');
                    const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.state.userPos;
                    this.state.map.flyTo(actualStartPos, 21, { animate: true, duration: 1 });
                });

                window.addEventListener('beforeunload', () => { 
                    if (this.watchId) navigator.geolocation.clearWatch(this.watchId); 
                    if (this.queueIntervalId) clearInterval(this.queueIntervalId);
                });
            }

            toggleSheet() {
                if(this.state.sheetState === 'active') this.updateSheetState('minimized');
                else if(this.state.sheetState === 'minimized') this.updateSheetState('active');
            }

            handleLocationSelect(id) {
                if (!id) return;
                const target = [...this.DATA.LOCATIONS, ...this.DATA.PARKIRAN].find(p => p.id === id);
                if (!target || (this.state.currentTarget && this.state.currentTarget.id === target.id)) return;

                this.state.map.closePopup();
                this.state.currentTarget = target;
                
                this.DOM.inputSearchTujuan.value = target.name;
                this.DOM.inputSearchTujuan.blur();

                const isFav = this.state.favorites.includes(target.id);
                this.DOM.btnToggleFav.classList.toggle('is-fav', isFav);

                this.calculateCustomRoute();
            }

            handleStartSelect(id) {
                if (id === 'gps') {
                    this.state.isManualStart = false; this.state.manualStartTarget = null;
                    this.state.userMarker.setLatLng(this.state.userPos); this.state.map.flyTo(this.state.userPos, 20, { animate: true }); 
                } else {
                    this.state.isManualStart = true; this.state.manualStartTarget = this.DATA.LOCATIONS.find(p => p.id === id);
                    if (this.state.manualStartTarget) {
                        const manualPos = [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng];
                        this.state.userMarker.setLatLng(manualPos); this.state.map.flyTo(manualPos, 20, { animate: true }); 
                    }
                }
                this.DOM.selectAsal.blur();
                if (this.state.currentTarget) this.calculateCustomRoute(); 
            }

            analyzeTurns(pathSegments, targetLngLat) {
                this.state.turnInstructions = [];
                for (let i = 0; i < pathSegments.length - 1; i++) {
                    const seg1 = pathSegments[i]; const seg2 = pathSegments[i+1];
                    const pt1 = turf.point([seg1.start[1], seg1.start[0]]);
                    const pt2 = turf.point([seg1.end[1], seg1.end[0]]);
                    const pt3 = turf.point([seg2.end[1], seg2.end[0]]);

                    const b1 = turf.bearing(pt1, pt2); const b2 = turf.bearing(pt2, pt3);
                    let diff = (b2 - b1 + 360) % 360;
                    
                    let turnType = null;
                    if (diff > 25 && diff < 155) turnType = 'kanan';
                    else if (diff > 205 && diff < 335) turnType = 'kiri';

                    if (turnType) {
                        const distToTarget = turf.distance(pt2, turf.point([targetLngLat[0], targetLngLat[1]]), {units: 'meters'});
                        if(distToTarget > 15) this.state.turnInstructions.push({ coord: seg1.end, type: turnType, announced: false, passed: false });
                    }
                }
            }

            calculateCustomRoute(isSilent = false) {
                if (!isSilent) {
                    this.clearRouteLayers();
                    this.updateSheetState('active');
                    this.DOM.sheetTitle.textContent = "Mencari Rute Terbaik...";
                    this.DOM.sheetMeta.textContent = "Menghitung...";
                    this.DOM.routeOptionsContainer.innerHTML = '';
                    
                    this.DOM.instruksiList.innerHTML = '';
                    const skeletonContainer = document.createElement('div');
                    skeletonContainer.className = 'space-y-4 py-2';
                    skeletonContainer.innerHTML = `<div class="flex gap-4"><div class="skeleton h-8 w-8 rounded-full shrink-0"></div><div class="space-y-2 w-full"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/4"></div></div></div>`;
                    this.DOM.instruksiList.appendChild(skeletonContainer);
                }

                setTimeout(() => {
                    const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.state.userPos;
                    const startLngLat = [actualStartPos[1], actualStartPos[0]];
                    const targetLngLat = [this.state.currentTarget.lng, this.state.currentTarget.lat];
                    
                    const computeFullRoute = (weightType, avoidNode = null) => {
                        let pathSegments = []; let parkingData = null;

                        if (this.state.transportMode !== 'jalan_kaki' && this.state.transportMode !== 'kursi_roda') {
                            const targetPoint = turf.point(targetLngLat);
                            const allowedParkings = this.DATA.PARKIRAN.filter(p => {
                                if (this.state.transportMode === 'mobil') return p.type === 'mobil';
                                if (this.state.transportMode === 'motor') return p.type === 'motor' || p.type === 'mobil';
                                return false;
                            });
                            
                            let nearestParking = null, minDistToTarget = Infinity;
                            allowedParkings.forEach(p => {
                                const d = turf.distance(targetPoint, turf.point([p.lng, p.lat]), {units: 'meters'});
                                if (d < minDistToTarget) { minDistToTarget = d; nearestParking = p; }
                            });

                            if (nearestParking) {
                                parkingData = nearestParking; const parkLngLat = [nearestParking.lng, nearestParking.lat];
                                const path1 = this.findShortestPath(startLngLat, parkLngLat, this.state.transportMode, weightType, avoidNode);
                                const path2 = this.findShortestPath(parkLngLat, targetLngLat, 'jalan_kaki', 'distance');

                                if (path1.length > 0) {
                                    pathSegments.push({ start: actualStartPos, end: path1[0].start, type: this.state.transportMode });
                                    pathSegments.push(...path1);
                                    pathSegments.push({ start: path1[path1.length-1].end, end: [nearestParking.lat, nearestParking.lng], type: this.state.transportMode });
                                } else pathSegments.push({ start: actualStartPos, end: [nearestParking.lat, nearestParking.lng], type: this.state.transportMode });

                                if (path2.length > 0) {
                                    pathSegments.push({ start: [nearestParking.lat, nearestParking.lng], end: path2[0].start, type: 'jalan_kaki' });
                                    pathSegments.push(...path2);
                                    pathSegments.push({ start: path2[path2.length-1].end, end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: 'jalan_kaki' });
                                } else pathSegments.push({ start: [nearestParking.lat, nearestParking.lng], end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: 'jalan_kaki' });
                            }
                        } else {
                            const pathWalk = this.findShortestPath(startLngLat, targetLngLat, this.state.transportMode, weightType, avoidNode);
                            if (pathWalk.length > 0) {
                                pathSegments.push({ start: actualStartPos, end: pathWalk[0].start, type: this.state.transportMode });
                                pathSegments.push(...pathWalk);
                                pathSegments.push({ start: pathWalk[pathWalk.length-1].end, end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: this.state.transportMode });
                            } else pathSegments.push({ start: actualStartPos, end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: this.state.transportMode });
                        }

                        let distK = 0, distJ = 0;
                        pathSegments.forEach(seg => {
                            const p1 = turf.point([seg.start[1], seg.start[0]]); const p2 = turf.point([seg.end[1], seg.end[0]]);
                            const d = turf.distance(p1, p2, {units: 'meters'});
                            if ((seg.type === 'mobil' || seg.type === 'motor') && this.state.transportMode !== 'jalan_kaki' && this.state.transportMode !== 'kursi_roda') distK += d; else distJ += d;
                        });

                        const totalDistMeters = Math.round(distK + distJ);
                        // Speed kursi roda sedikit lebih pelan dari jalan kaki
                        let walkSpeed = this.state.transportMode === 'kursi_roda' ? 1.0 : 1.4;
                        const timeSecs = (distK / 5.5) + (distJ / walkSpeed);
                        return { segments: pathSegments, parking: parkingData, distK, distJ, totalDist: totalDistMeters, timeMinutes: Math.ceil(timeSecs / 60) || 1 };
                    };

                    this.state.availableRoutes = [];
                    const fastestRoute = computeFullRoute('time');
                    fastestRoute.name = 'Tercepat'; this.state.availableRoutes.push(fastestRoute);

                    const shortestRoute = computeFullRoute('distance');
                    if (Math.abs(fastestRoute.totalDist - shortestRoute.totalDist) > 10) {
                        shortestRoute.name = 'Terpendek'; this.state.availableRoutes.push(shortestRoute);
                    }

                    this.selectRoute(0, isSilent);

                }, isSilent ? 0 : 100); 
            }

            selectRoute(index, isSilent = false) {
                if (!this.state.availableRoutes[index]) return;
                this.state.selectedRouteIndex = index;
                const route = this.state.availableRoutes[index];
                this.state.currentRouteSegments = route.segments;
                this.state.currentParking = route.parking;
                this.analyzeTurns(route.segments, [this.state.currentTarget.lng, this.state.currentTarget.lat]);
                this.drawMultipleRoutes(isSilent);
                this.renderCustomRouteInfo(route, isSilent);
            }

            drawMultipleRoutes(isSilent = false) {
                if (isSilent) this.clearRouteLayers(); 
                const allCoords = [];
                
                this.state.availableRoutes.forEach((route, idx) => {
                    if (idx === this.state.selectedRouteIndex) return; 
                    const coords = route.segments.map(seg => seg.start); coords.push(route.segments[route.segments.length-1].end);
                    const l = L.polyline(coords, { color: '#9ca3af', weight: 8, opacity: 0.7, lineJoin: 'round' }).addTo(this.state.map);
                    this.state.routeLayers.push(l);
                });

                const selectedRoute = this.state.availableRoutes[this.state.selectedRouteIndex];
                const groupedSegments = []; let currentGroup = null;

                selectedRoute.segments.forEach(seg => {
                    let displayType = (seg.type === 'mobil' || seg.type === 'motor') ? 'kendaraan' : 'jalan_kaki';
                    if (this.state.transportMode === 'jalan_kaki') displayType = 'jalan_kaki';
                    if (this.state.transportMode === 'kursi_roda') displayType = 'kursi_roda'; // Custom rendering untuk kursi roda
                    
                    if (!currentGroup || currentGroup.type !== displayType) {
                        currentGroup = { type: displayType, coords: [seg.start, seg.end] }; groupedSegments.push(currentGroup);
                    } else currentGroup.coords.push(seg.end);
                });

                groupedSegments.forEach(group => {
                    allCoords.push(...group.coords);
                    if (group.type === 'kendaraan') {
                        const l1 = L.polyline(group.coords, { color: '#0e3160', weight: 14, opacity: 0.8, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l2 = L.polyline(group.coords, { color: '#facc15', weight: 8, opacity: 1, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l3 = L.polyline(group.coords, { color: '#ffffff', weight: 4, opacity: 1, dashArray: '15, 35', className: 'route-path-animated', lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        this.state.routeLayers.push(l1, l2, l3);
                    } else if (group.type === 'kursi_roda') {
                        // [FITUR BARU] Rendering jalur warna biru cerah khusus rute aksesibel difabel
                        const l1 = L.polyline(group.coords, { color: '#1d4ed8', weight: 10, opacity: 0.8, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l2 = L.polyline(group.coords, { color: '#93c5fd', weight: 6, opacity: 1, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l3 = L.polyline(group.coords, { color: '#ffffff', weight: 3, opacity: 1, dashArray: '10, 20', className: 'route-path-animated', lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        this.state.routeLayers.push(l1, l2, l3);
                    } else {
                        const l1 = L.polyline(group.coords, { color: '#15803d', weight: 10, opacity: 0.8, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l2 = L.polyline(group.coords, { color: '#bbf7d0', weight: 6, opacity: 1, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l3 = L.polyline(group.coords, { color: '#ffffff', weight: 3, opacity: 1, dashArray: '10, 20', className: 'route-path-animated', lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        this.state.routeLayers.push(l1, l2, l3);
                    }
                });

                if (this.state.currentParking) {
                    const parkMarker = L.marker([this.state.currentParking.lat, this.state.currentParking.lng], { icon: this.icons.parking }).addTo(this.state.map);
                    this.state.routeLayers.push(parkMarker);
                }

                if (allCoords.length > 0 && !isSilent && !this.state.isNavigating) {
                    this.state.map.fitBounds(L.latLngBounds(allCoords), { paddingTopLeft: [50, 50], paddingBottomRight: window.innerWidth >= 768 ? [50, 400] : [50, 300] });
                }
            }

            clearRouteLayers() { this.state.routeLayers.forEach(layer => this.state.map.removeLayer(layer)); this.state.routeLayers = []; }

            renderCustomRouteInfo(routeData, isSilent = false) {
                const totalDistMeters = routeData.totalDist; const timeMinutes = routeData.timeMinutes;
                this.state.initialRouteDistance = totalDistMeters;

                const arrivalTime = new Date(); arrivalTime.setMinutes(arrivalTime.getMinutes() + timeMinutes);
                const timeString = arrivalTime.getHours().toString().padStart(2, '0') + ':' + arrivalTime.getMinutes().toString().padStart(2, '0');

                this.DOM.sheetMeta.innerHTML = '';
                const spanTime = document.createElement('span'); spanTime.className = 'text-[#15803d] font-black text-lg'; spanTime.textContent = `${timeMinutes} mnt`;
                const spanDist = document.createElement('span'); spanDist.className = 'text-gray-500 font-medium text-sm'; spanDist.textContent = ` (${totalDistMeters} m)`;
                const spanDot = document.createElement('span'); spanDot.className = 'mx-1 text-gray-300'; spanDot.textContent = '•';
                const spanArrival = document.createElement('span'); spanArrival.className = 'text-[#0e3160] font-bold text-sm'; spanArrival.textContent = ` Tiba ${timeString}`;
                
                this.DOM.sheetMeta.append(spanTime, spanDist, spanDot, spanArrival);
                this.DOM.topDistance.textContent = `Sisa jarak: ${totalDistMeters} m`;

                if (!isSilent) {
                    const safeName = this.state.currentTarget.name; this.DOM.sheetTitle.textContent = safeName;
                    
                    this.DOM.routeOptionsContainer.innerHTML = '';
                    if (this.state.availableRoutes.length > 1) {
                        this.state.availableRoutes.forEach((altRoute, idx) => {
                            const btn = document.createElement('button');
                            btn.className = `route-chip ${idx === this.state.selectedRouteIndex ? 'active' : ''}`;
                            btn.textContent = `${altRoute.name} (${altRoute.timeMinutes} mnt)`;
                            btn.addEventListener('click', () => this.selectRoute(idx, true)); 
                            this.DOM.routeOptionsContainer.appendChild(btn);
                        });
                    }

                    this.DOM.instruksiList.innerHTML = ''; 
                    const createInstructionItem = (iconBg, iconSvg, titleText, descText, delayClass = '') => {
                        const item = document.createElement('div'); item.className = `flex gap-4 items-start py-3 border-b border-gray-100 animate-fade-in-up`;
                        if (delayClass) item.style.animationDelay = delayClass;
                        const iconDiv = document.createElement('div'); iconDiv.className = `mt-1 ${iconBg} rounded-full p-1.5 shadow-sm text-center align-middle flex items-center justify-center w-8 h-8`; iconDiv.innerHTML = iconSvg; 
                        const textDiv = document.createElement('div');
                        const pTitle = document.createElement('p'); pTitle.className = 'text-sm font-bold text-[#0e3160]'; pTitle.textContent = titleText;
                        const pDesc = document.createElement('p'); pDesc.className = 'text-xs text-gray-500 mt-0.5'; pDesc.textContent = descText;
                        textDiv.append(pTitle, pDesc); item.append(iconDiv, textDiv); return item;
                    };
                    
                    if (this.state.transportMode === 'kursi_roda') {
                        // [FITUR BARU] Instruksi Khusus Aksesibilitas
                        const accSvg = `<span class="text-lg">♿</span>`;
                        const step1 = createInstructionItem('text-white bg-blue-600', accSvg, `Rute Ramah Difabel Diaktifkan`, `Menuju ${safeName} menggunakan jalur khusus. Silakan gunakan bidang landai (ramp) & lift jika berpindah lantai.`, '100ms');
                        this.DOM.instruksiList.appendChild(step1);
                        this.DOM.topInstruction.textContent = `Ikuti jalur biru menuju tujuan`;
                    } else if (routeData.parking && routeData.distK > 0) {
                        const parkName = routeData.parking.name;
                        const carSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>`;
                        const walkSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`;
                        
                        const step1 = createInstructionItem('text-[#facc15] bg-[#0e3160]', carSvg, `Berkendara ke ${parkName}`, `Ikuti jalur kuning sejauh ${Math.round(routeData.distK)} meter`, '100ms');
                        const step2 = createInstructionItem('text-white bg-[#15803d]', walkSvg, `Parkir, lalu jalan kaki ke Gedung`, `Menuju ${safeName} sejauh ${Math.round(routeData.distJ)} meter`, '200ms');
                        
                        this.DOM.instruksiList.append(step1, step2); this.DOM.topInstruction.textContent = `Arahkan ke Parkiran`;
                    } else {
                        const walkSvg = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`;
                        const step1 = createInstructionItem('text-white bg-[#15803d]', walkSvg, `Jalan kaki di jalur hijau`, `Menuju ${safeName} sejauh ${Math.round(routeData.distJ)} meter`);
                        this.DOM.instruksiList.appendChild(step1); this.DOM.topInstruction.textContent = `Jalan menuju tujuan`;
                    }
                }
            }

            checkRouteStatus(newPos) {
                if (!this.state.currentRouteSegments || this.state.currentRouteSegments.length === 0) return;

                const userPt = turf.point([newPos[1], newPos[0]]);
                const targetPt = turf.point([this.state.currentTarget.lng, this.state.currentTarget.lat]);
                const distToTarget = turf.distance(userPt, targetPt, {units: 'meters'});

                if (distToTarget <= 15) {
                    this.speak(`Anda telah sampai di ${this.state.currentTarget.name}. Navigasi diakhiri.`);
                    this.stopNavigation();
                    return;
                }
                
                let initialDist = this.state.initialRouteDistance;
                if (!initialDist || distToTarget > initialDist) { this.state.initialRouteDistance = distToTarget; initialDist = distToTarget; }
                
                let travelled = initialDist - distToTarget;
                let progress = Math.max(0, Math.min(100, (travelled / initialDist) * 100)); 
                let speed = this.state.transportMode === 'jalan_kaki' ? 1.4 : (this.state.transportMode === 'kursi_roda' ? 1.0 : 5.5); 
                let etaMinutes = Math.ceil((distToTarget / speed) / 60);
                let distDisplay = distToTarget >= 1000 ? (distToTarget/1000).toFixed(1) + ' km' : Math.round(distToTarget) + ' m';
                
                if (this.DOM.topDistance && this.DOM.navProgressBar) {
                    this.DOM.topDistance.textContent = `${etaMinutes} menit • ${distDisplay} (${Math.round(progress)}%)`;
                    this.DOM.navProgressBar.style.width = `${progress}%`;
                }

                let nextTurnFound = false; let turnIconText = '⬆️'; let arInstText = 'Lurus Terus';
                if (this.state.turnInstructions.length > 0) {
                    let upcomingTurn = this.state.turnInstructions.find(t => !t.passed);
                    if (upcomingTurn) {
                        const distToTurn = turf.distance(userPt, turf.point([upcomingTurn.coord[1], upcomingTurn.coord[0]]), {units:'meters'});
                        
                        if (distToTurn < 10) upcomingTurn.passed = true; 
                        else {
                            this.DOM.topInstruction.textContent = `Belok ${upcomingTurn.type} dalam ${Math.round(distToTurn)} meter`;
                            arInstText = `Belok ${upcomingTurn.type} di depan`;
                            nextTurnFound = true;
                            if (upcomingTurn.type === 'kiri') turnIconText = '⬅️'; else if (upcomingTurn.type === 'kanan') turnIconText = '➡️';
                            
                            if (distToTurn <= 25 && !upcomingTurn.announced) { 
                                this.speak(`Persiapkan diri, belok ${upcomingTurn.type} dalam ${Math.round(distToTurn)} meter.`);
                                upcomingTurn.announced = true;
                            }
                        }
                    }
                }

                if (!nextTurnFound) { this.DOM.topInstruction.textContent = `Terus lurus menuju tujuan`; }
                if (this.DOM.navTurnIcon) this.DOM.navTurnIcon.textContent = turnIconText;
                
                if (this.state.isARMode) {
                    this.DOM.arInstruction.textContent = arInstText;
                    this.DOM.arDist.textContent = distDisplay;
                }

                const routeCoords = [];
                this.state.currentRouteSegments.forEach(seg => { routeCoords.push([seg.start[1], seg.start[0]]); routeCoords.push([seg.end[1], seg.end[0]]); });

                if (routeCoords.length >= 2) {
                    const routeLine = turf.lineString(routeCoords);
                    const distToRoute = turf.pointToLineDistance(userPt, routeLine, {units: 'meters'});

                    if (distToRoute > 20) {
                        const now = Date.now();
                        if (now - this.state.lastOffRouteWarn > 15000) {
                            this.speak("Anda keluar dari jalur. Rute sedang dihitung ulang.");
                            this.DOM.topInstruction.textContent = "Menghitung ulang rute...";
                            this.DOM.topInstruction.classList.add('text-red-300');
                            setTimeout(() => { this.DOM.topInstruction.classList.remove('text-red-300'); }, 4000);
                            this.state.lastOffRouteWarn = now; this.state.needsRecalculation = true; 
                        }
                    }
                }
            }

            getHeadingTarget(currentPos) {
                if (!this.state.currentRouteSegments || this.state.currentRouteSegments.length === 0) return [this.state.currentTarget.lat, this.state.currentTarget.lng];
                let targetPos = this.state.currentRouteSegments[0].end;
                for (let i = 0; i < this.state.currentRouteSegments.length; i++) {
                    const segEnd = this.state.currentRouteSegments[i].end;
                    const dist = turf.distance( turf.point([currentPos[1], currentPos[0]]), turf.point([segEnd[1], segEnd[0]]), {units: 'meters'} );
                    if (dist > 5) { targetPos = segEnd; break; }
                    targetPos = segEnd;
                }
                return targetPos;
            }

            updateMapHeading(startPos, endPos) {
                if (!this.state.isNavigating) return;
                const toRad = deg => deg * Math.PI / 180; const toDeg = rad => rad * 180 / Math.PI;
                const lat1 = toRad(startPos[0]), lng1 = toRad(startPos[1]); const lat2 = toRad(endPos[0]), lng2 = toRad(endPos[1]);
                const dLng = lng2 - lng1;

                const y = Math.sin(dLng) * Math.cos(lat2);
                const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
                const rawBearing = (toDeg(Math.atan2(y, x)) + 360) % 360;

                let diff = rawBearing - this.state.currentHeading;
                diff = ((diff + 180) % 360 + 360) % 360 - 180;
                this.state.currentHeading += diff;

                document.documentElement.style.setProperty('--map-heading', `-${this.state.currentHeading}deg`);
                setTimeout(() => { const arrowSvg = document.querySelector('.nav-arrow-svg'); if (arrowSvg) arrowSvg.style.transform = `rotateZ(${this.state.currentHeading}deg)`; }, 50);
            }

            startNavigation() {
                if (!this.state.currentTarget || this.state.currentRouteSegments.length === 0) return;
                
                this.state.isNavigating = true;
                this.DOM.body.classList.add('is-navigating');
                this.updateSheetState('minimized');
                
                this.state.isCameraLocked = true;
                this.DOM.btnRecenter.classList.add('hidden');
                this.DOM.btnRecenter.classList.remove('flex');
                
                this.state.userMarker.setIcon(this.icons.navigating);
                
                const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.state.userPos;
                let targetPos = this.getHeadingTarget(actualStartPos);
                
                this.updateMapHeading(actualStartPos, targetPos);
                this.state.map.flyTo(actualStartPos, 21, { animate: true, duration: 1.5, easeLinearity: 0.25 });
                
                const safeTargetName = Utils.escapeHTML(this.state.currentTarget.name);
                let textMsg = this.state.isManualStart ? `Simulasi rute ke ${safeTargetName} dimulai.` : `Navigasi dimulai. Silakan ikuti jalur di peta.`;
                if(this.state.transportMode === 'kursi_roda') textMsg += " Gunakan akses landai yang tersedia.";
                this.speak(textMsg);
            }

            stopNavigation() {
                this.state.isNavigating = false;
                this.DOM.body.classList.remove('is-navigating');
                this.updateSheetState('closed');
                this.DOM.inputSearchTujuan.value = "";
                this.state.currentTarget = null;
                this.state.turnInstructions = [];
                this.state.needsRecalculation = false;
                this.state.availableRoutes = []; 
                
                this.state.isCameraLocked = true;
                this.DOM.btnRecenter.classList.add('hidden');
                this.DOM.btnRecenter.classList.remove('flex');
                
                this.DOM.topInstruction.textContent = "Mencari rute...";
                this.DOM.topDistance.textContent = "--";
                if (this.DOM.navProgressBar) this.DOM.navProgressBar.style.width = "0%";
                if (this.DOM.navTurnIcon) this.DOM.navTurnIcon.textContent = "⬆️"; 

                this.clearRouteLayers();
                if (this.state.isARMode) this.stopAR();
                
                if (this.watchId) { navigator.geolocation.clearWatch(this.watchId); this.watchId = null; }
                
                let snapNorth = Math.round(this.state.currentHeading / 360) * 360;
                this.state.currentHeading = snapNorth;
                document.documentElement.style.setProperty('--map-heading', `-${snapNorth}deg`);

                this.state.userMarker.setIcon(this.icons.idle);
                
                const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.DATA.PUSAT_KAWASAN;
                this.state.map.flyTo(actualStartPos, 20, { animate: true, duration: 1.5 }); 
                
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
                
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const p = [pos.coords.latitude, pos.coords.longitude];
                        this.state.userPos = p; this.state.userMarker.setLatLng(p);
                    }, () => {}, { enableHighAccuracy: true, maximumAge: 30000 });
                }
            }

            updateSheetState(newState) {
                this.state.sheetState = newState;
                this.DOM.sheet.classList.remove('sheet-active', 'sheet-minimized');
                if (newState === 'active') this.DOM.sheet.classList.add('sheet-active');
                else if (newState === 'minimized') this.DOM.sheet.classList.add('sheet-minimized');
            }

            requestGeolocation() {
                if (!navigator.geolocation) { this.showToast("GPS tidak didukung oleh browser Anda."); return; }
                const options = { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 };

                if (this.watchId) navigator.geolocation.clearWatch(this.watchId);

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const newPos = [pos.coords.latitude, pos.coords.longitude];
                        this.state.userPos = newPos;
                        if (!this.state.isManualStart) this.state.userMarker.setLatLng(newPos);
                        this.DOM.btnLocation.classList.add('text-[#1a73e8]'); this.DOM.btnLocation.classList.remove('text-red-500');
                    },
                    (err) => {
                        if(err.code === 1) this.showToast("Akses GPS diblokir. Gunakan pilihan lokasi manual di atas.", "error");
                        this.DOM.btnLocation.classList.remove('text-[#1a73e8]'); this.DOM.btnLocation.classList.add('text-red-500');
                    }, options
                );

                this.watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        let newPos = [pos.coords.latitude, pos.coords.longitude];
                        
                        if (this.state.isNavigating && this.state.currentRouteSegments.length > 0) {
                            try {
                                const routeCoords = [];
                                this.state.currentRouteSegments.forEach(seg => { routeCoords.push([seg.start[1], seg.start[0]]); });
                                routeCoords.push([this.state.currentRouteSegments[this.state.currentRouteSegments.length-1].end[1], this.state.currentRouteSegments[this.state.currentRouteSegments.length-1].end[0]]);
                                const routeLine = turf.lineString(routeCoords);
                                const userPt = turf.point([newPos[1], newPos[0]]);
                                const snapped = turf.nearestPointOnLine(routeLine, userPt, {units: 'meters'});
                                if (snapped.properties.dist < 15) newPos = [snapped.geometry.coordinates[1], snapped.geometry.coordinates[0]];
                            } catch(e) { console.warn('Map Matching skipped:', e); }
                        }

                        this.state.userPos = newPos;
                        if (!this.state.isManualStart) this.state.userMarker.setLatLng(newPos);
                        this.DOM.btnLocation.classList.add('text-[#1a73e8]'); this.DOM.btnLocation.classList.remove('text-red-500');
                        
                        if (this.state.isNavigating && this.state.currentTarget && !this.state.isManualStart) {
                            if (this.state.isCameraLocked) {
                                this.state.map.panTo(newPos, { animate: true, duration: 1 });
                                let targetPos = this.getHeadingTarget(newPos);
                                this.updateMapHeading(newPos, targetPos);
                            }
                            this.checkRouteStatus(newPos); 
                            if(this.state.needsRecalculation) { this.calculateCustomRouteThrottled(true); this.state.needsRecalculation = false; }
                        }
                    },
                    (err) => { this.DOM.btnLocation.classList.remove('text-[#1a73e8]'); this.DOM.btnLocation.classList.add('text-red-500'); },
                    options
                );
            }

            focusUserLocation() { 
                this.requestDeviceOrientation();
                if (this.state.isManualStart) {
                    this.state.map.flyTo([this.state.manualStartTarget.lat, this.state.manualStartTarget.lng], 20, { animate: true, duration: 1 });
                    return;
                }
                this.showToast("Mencari sinyal GPS...", "success");
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const newPos = [pos.coords.latitude, pos.coords.longitude];
                        this.state.userPos = newPos; this.state.userMarker.setLatLng(newPos);
                        this.state.map.flyTo(newPos, 20, { animate: true, duration: 1 });
                        if(this.state.isNavigating && !this.state.isManualStart) this.calculateCustomRoute(true);
                    },
                    (err) => {
                        if(err.code === 1) this.showToast("Izin GPS ditolak oleh Browser.", "error"); else this.showToast("Gagal mendapat sinyal GPS.", "error");
                    }, { enableHighAccuracy: true }
                );
            }

            speak(text) { 
                if ('speechSynthesis' in window) { 
                    try { 
                        window.speechSynthesis.cancel(); 
                        const msg = new SpeechSynthesisUtterance(text); 
                        msg.lang = 'id-ID'; msg.rate = 1.0; msg.pitch = 1.0;
                        window.speechSynthesis.speak(msg); 
                    } catch (e) { console.error("Speech error", e); } 
                } 
            }
        }

        document.addEventListener('DOMContentLoaded', () => { window.puprApp = new PuprNavigationApp(APP_DATA); });
    </script>
</body>
</html>
