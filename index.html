<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0e3160">
    <meta name="description" content="Aplikasi Navigasi Kawasan Dinas PUPR Kabupaten Garut">
    <title>Navigasi PUPR Garut</title>
    
    <link rel="preload" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" as="style">
    <link rel="preload" href="https://cdn.tailwindcss.com" as="script">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Turf.js untuk komputasi spasial & Dijkstra kustom -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        :root {
            --pu-blue: #0e3160;
            --pu-yellow: #facc15;
            --garut-green: #15803d;
            --sheet-height: 140px;
        }

        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }

        /* KONTROL KAMERA (TAMPAK ATAS 2D DENGAN ROTASI ARAH HP) */
        body:not(.is-navigating) #map {
            transform: rotateZ(var(--map-heading, 0deg)) translateY(0);
            transform-origin: center center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body.is-navigating #map {
            transform: rotateZ(var(--map-heading, 0deg)) translateY(20vh);
            transform-origin: center center;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* CUSTOM ANIMATIONS */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }

        @keyframes dropIn { 0% { opacity: 0; margin-top: -30px; } 100% { opacity: 1; margin-top: 0; } }
        .leaflet-marker-icon:not(.user-dot):not(.nav-arrow-container):not(.parkir-icon) { animation: dropIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat; background-size: 1000px 100%;
            animation: shimmer 1.5s infinite linear; border-radius: 4px;
        }

        .user-dot {
            width: 20px; height: 20px;
            background-color: var(--pu-yellow);
            border: 3px solid var(--pu-blue); border-radius: 50%;
            box-shadow: 0 0 10px rgba(14, 49, 96, 0.6); position: relative;
        }
        .user-dot::after {
            content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
            border: 2px solid var(--pu-yellow); border-radius: 50%;
            animation: pulse 2s infinite; opacity: 0;
        }
        @keyframes pulse { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        @keyframes routeFlow { 0% { stroke-dashoffset: 50; } 100% { stroke-dashoffset: 0; } }
        .route-path-animated {
            animation: routeFlow 1s linear infinite;
            filter: drop-shadow(0px 0px 4px rgba(255, 255, 255, 0.9));
        }

        .nav-arrow-container { filter: drop-shadow(0px 6px 4px rgba(0,0,0,0.4)); }
        .nav-arrow-svg {
            width: 100%; height: 100%;
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* UI COMPONENTS */
        .bottom-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform; }
        .sheet-active { transform: translateY(0); }
        .sheet-minimized { transform: translateY(calc(100% - var(--sheet-height))); }

        /* PERBAIKAN RESPONSIVE DESKTOP */
        @media (min-width: 768px) {
            .bottom-sheet { transform: translateX(-120%); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
            .sheet-active { transform: translateX(0); }
            .sheet-minimized { transform: translateX(0); } /* Desktop layarnya luas, panel tidak perlu di-minimize */
            #sheet-handle { display: none; } /* Sembunyikan garis drag di PC */
            #instruksi-list { max-height: calc(100vh - 280px) !important; }
        }

        body.is-navigating .hide-on-nav { display: none !important; }
        body.is-navigating .show-on-nav { display: block !important; }
        .show-on-nav { display: none; }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; border-radius: 4px;}
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(14, 49, 96, 0.2); border-radius: 4px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Top Navigation Overlay -->

        <div class="flex items-center gap-4 max-w-md mx-auto">
            <div class="p-2 bg-[#facc15] text-[#0e3160] rounded-full shadow-inner animate-pulse" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
            </div>
            <div class="flex-1">
                <p id="top-instruction" class="text-xl font-bold leading-tight" aria-live="polite">Mencari rute...</p>
                <p id="top-distance" class="text-sm text-[#facc15] font-semibold">--</p>
            </div>
            <button id="btn-stop-nav" class="bg-red-500 hover:bg-red-600 active:scale-95 transition-all p-2 rounded-lg text-xs font-bold uppercase tracking-wider shadow-md">Selesai</button>
        </div>
    </header>

    <!-- Search Area -->
    <!-- Ditambahkan: md:left-4 md:w-[400px] md:mx-0 untuk mengubah posisi ke kiri pada Desktop -->
    <div class="hide-on-nav absolute top-3 left-3 right-3 md:top-4 md:left-4 md:right-auto md:w-[400px] z-[1000] mx-auto md:mx-0 flex flex-col gap-2 animate-fade-in-up" style="animation-delay: 100ms;">
        <div class="bg-white rounded-3xl shadow-lg flex flex-col border border-gray-100 focus-within:ring-2 focus-within:ring-[#0e3160] transition-all duration-300">

            <div class="flex items-center px-2 border-b border-gray-100 bg-gray-50 rounded-t-3xl">

                </span>
                <select id="select-asal" aria-label="Pilih lokasi awal" class="flex-1 py-2 bg-transparent outline-none text-[#0e3160] font-semibold text-sm appearance-none truncate cursor-pointer transition-colors">
                    <option value="gps" selected>📍 Lokasi Saat Ini (GPS)</option>
                    <!-- Options populated by JS -->
                </select>
            </div>

            <!-- PERBAIKAN UI: Row 2 - Pilihan Tujuan -->
            <div class="flex items-center px-2 py-1 border-b border-gray-100">
                <span class="p-2 text-red-500" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </span>
                <select id="select-tujuan" aria-label="Pilih lokasi tujuan" class="flex-1 py-2 bg-transparent outline-none text-[#0e3160] font-bold appearance-none truncate cursor-pointer transition-colors">
                    <option value="" disabled selected>Cari tujuan di PUPR...</option>
                </select>
                <div class="p-1 border-l border-gray-200 ml-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Lambang_Kabupaten_Garut.png" class="h-7 w-7 object-contain drop-shadow-sm transition-transform hover:scale-110" alt="Logo Garut">
                </div>
            </div>
            
            <!-- Row 3: Mode Kendaraan Toggle -->
            <div class="flex bg-gray-50 rounded-b-3xl p-1.5 gap-1" id="mode-selector">
                <button onclick="window.puprApp.setTransportMode('jalan_kaki')" id="btn-mode-jalan_kaki" class="flex-1 py-2 text-xs font-bold rounded-2xl bg-[#0e3160] text-white transition-all shadow-sm">
                    🚶‍♂️ Jalan Kaki

                <button onclick="window.puprApp.setTransportMode('motor')" id="btn-mode-motor" class="flex-1 py-2 text-xs font-bold rounded-2xl text-gray-500 hover:bg-gray-200 transition-all">
                    🏍️ Motor
                </button>
                <button onclick="window.puprApp.setTransportMode('mobil')" id="btn-mode-mobil" class="flex-1 py-2 text-xs font-bold rounded-2xl text-gray-500 hover:bg-gray-200 transition-all">

            </div>
        </div>

        <div class="flex overflow-x-auto hide-scrollbar gap-2 px-1 pb-1 mt-1">

            <button onclick="window.puprApp.handleLocationSelect('mushala')" class="shrink-0 bg-white/90 backdrop-blur border border-gray-200 shadow-sm rounded-full px-4 py-1.5 text-sm font-semibold text-[#0e3160] hover:bg-[#0e3160] hover:text-white active:scale-95 transition-all flex items-center gap-1">🕌 Mushala</button>
            <button onclick="window.puprApp.handleLocationSelect('kantin_1')" class="shrink-0 bg-white/90 backdrop-blur border border-gray-200 shadow-sm rounded-full px-4 py-1.5 text-sm font-semibold text-[#0e3160] hover:bg-[#0e3160] hover:text-white active:scale-95 transition-all flex items-center gap-1">☕ Kantin</button>

    <!-- Map Container Wrapper -->

    </div>

    <!-- Floating Action Buttons -->

        </button>
    </div>

    <!-- Bottom Info Sheet -->

        </div>

                MULAI NAVIGASI

        </div>
    </aside>

            setTransportMode(mode) {
                this.state.transportMode = mode;
                
                const activeClass = ['bg-[#0e3160]', 'text-white', 'shadow-sm'];
                const inactiveClass = ['text-gray-500', 'hover:bg-gray-200'];
                
                [this.DOM.btnModeJalanKaki, this.DOM.btnModeMotor, this.DOM.btnModeMobil].forEach(btn => {
                    btn.classList.remove(...activeClass);
                    btn.classList.add(...inactiveClass);
                });
                
                let activeBtn;
                if(mode === 'jalan_kaki') activeBtn = this.DOM.btnModeJalanKaki;
                else if(mode === 'motor') activeBtn = this.DOM.btnModeMotor;
                else if(mode === 'mobil') activeBtn = this.DOM.btnModeMobil;
                
                activeBtn.classList.remove(...inactiveClass);
                activeBtn.classList.add(...activeClass);

                if (this.state.currentTarget) this.calculateCustomRoute();
            }

            buildRoutingGraph() {
                const points = [];
                
                this.JALUR_KML_GEOJSON.features.forEach((feature) => {
                    const coords = feature.geometry.coordinates;
                    const tipeJalan = feature.properties.tipe;

                    for (let i = 0; i < coords.length; i++) {
                        const pt = coords[i];
                        const id = `${pt[0]},${pt[1]}`; 
                        
                        points.push({ id, coord: pt, type: tipeJalan });
                        if (!this.state.graph.has(id)) this.state.graph.set(id, []);

                        if (i > 0) {
                            const prevPt = coords[i-1];
                            const prevId = `${prevPt[0]},${prevPt[1]}`;
                            const dist = turf.distance(pt, prevPt, {units: 'meters'});

                            this.state.graph.get(id).push({ node: prevId, weight: dist, type: tipeJalan });
                            this.state.graph.get(prevId).push({ node: id, weight: dist, type: tipeJalan });
                        }
                    }
                });

                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        if (points[i].id === points[j].id) continue;
                        const dist = turf.distance(points[i].coord, points[j].coord, {units: 'meters'});
                        if (dist < 5.0) { 
                            this.state.graph.get(points[i].id).push({ node: points[j].id, weight: dist, type: 'jalan_kaki' });
                            this.state.graph.get(points[j].id).push({ node: points[i].id, weight: dist, type: 'jalan_kaki' });
                        }
                    }
                }
                this.state.nodes = points; 
            }

            getNearestNodeId(coordLngLat) {
                let nearest = null;
                let minDist = Infinity;
                this.state.nodes.forEach(pt => {
                    const dist = turf.distance(coordLngLat, pt.coord, {units: 'meters'});
                    if (dist < minDist) {
                        minDist = dist;
                        nearest = pt.id;
                    }
                });
                return nearest;
            }

            findShortestPath(startLngLat, endLngLat, mode) {
                const startId = this.getNearestNodeId(startLngLat);
                const endId = this.getNearestNodeId(endLngLat);

                if (!startId || !endId || startId === endId) return [];

                const distances = new Map();
                const previous = new Map();
                const queue = []; 

                this.state.graph.forEach((_, node) => {
                    distances.set(node, Infinity);
                    previous.set(node, null);
                });

                distances.set(startId, 0);
                queue.push({ node: startId, dist: 0 });

                while (queue.length > 0) {
                    queue.sort((a, b) => a.dist - b.dist);
                    const current = queue.shift().node;

                    if (current === endId) break;

                    const neighbors = this.state.graph.get(current);
                    for (let neighbor of neighbors) {
                        let speed = 1.4; 
                        
                        if (mode === 'mobil') {
                            if (neighbor.type === 'mobil') speed = 5.5; 
                            else if (neighbor.type === 'motor') speed = 0.001; 
                        } else if (mode === 'motor') {
                            if (neighbor.type === 'mobil' || neighbor.type === 'motor') speed = 5.5;
                        }

                        const timeCost = neighbor.weight / speed; 
                        const alt = distances.get(current) + timeCost;
                        
                        if (alt < distances.get(neighbor.node)) {
                            distances.set(neighbor.node, alt);
                            previous.set(neighbor.node, { node: current, type: neighbor.type });
                            queue.push({ node: neighbor.node, dist: alt });
                        }
                    }
                }

                if (distances.get(endId) === Infinity) return [];

                const pathSegments = [];
                let curr = endId;
                while (curr !== startId) {
                    const prevObj = previous.get(curr);
                    if(!prevObj) break;
                    
                    const p1 = prevObj.node.split(',').map(Number);
                    const p2 = curr.split(',').map(Number);
                    
                    pathSegments.unshift({
                        start: [p1[1], p1[0]], 
                        end: [p2[1], p2[0]],
                        type: prevObj.type
                    });
                    curr = prevObj.node;
                }
                return pathSegments;
            }

            setupMap() {
                this.state.map = L.map('map', { zoomControl: false, attributionControl: false }).setView(this.state.userPos, 19);
                L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], keepBuffer: 8, updateWhenIdle: false }).addTo(this.state.map);
                this.state.userMarker = L.marker(this.state.userPos, { icon: this.icons.idle }).addTo(this.state.map);

                const pinkIcon = L.icon({ iconUrl: 'http://maps.google.com/mapfiles/kml/paddle/pink-blank.png', iconSize: [32, 32], iconAnchor: [16, 32], tooltipAnchor: [0, -32] });

                this.LOCATIONS.forEach(loc => {
                    L.marker([loc.lat, loc.lng], { icon: pinkIcon }).addTo(this.state.map)
                      .bindTooltip(loc.name, { permanent: false, direction: 'top', className: 'font-semibold text-sm text-[#0e3160] border-2 border-[#facc15]' });
                });
            }

            // PERBAIKAN: Mengisi Dropdown Asal dan Tujuan secara bersamaan
            populateDropdown() {
                const categories = [...new Set(this.LOCATIONS.map(loc => loc.cat))].sort();
                
                const createOptions = () => {
                    const fragment = document.createDocumentFragment();
                    categories.forEach(cat => {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = `--- ${cat.toUpperCase()} ---`;
                        const locsInCat = this.LOCATIONS.filter(l => l.cat === cat).sort((a,b) => a.name.localeCompare(b.name));
                        locsInCat.forEach(loc => {
                            const option = document.createElement('option');
                            option.value = loc.id; option.textContent = loc.name; optgroup.appendChild(option);
                        });
                        fragment.appendChild(optgroup);
                    });
                    return fragment;
                };

                this.DOM.selectTujuan.appendChild(createOptions());
                this.DOM.selectAsal.appendChild(createOptions());
            }

            setupEventListeners() {
                // EVENT LISTENER BARU UNTUK PILIHAN TITIK AWAL
                this.DOM.selectAsal.addEventListener('change', (e) => this.handleStartSelect(e.target.value));
                
                this.DOM.selectTujuan.addEventListener('change', (e) => this.handleLocationSelect(e.target.value));
                this.DOM.btnLocation.addEventListener('click', () => this.focusUserLocation());
                this.DOM.btnSearchFocus.addEventListener('click', () => this.DOM.selectTujuan.focus());
                this.DOM.btnStartNav.addEventListener('click', () => this.startNavigation());
                this.DOM.btnStopNav.addEventListener('click', () => this.stopNavigation());
                this.DOM.btnCloseSheet.addEventListener('click', () => this.updateSheetState('closed'));
                this.DOM.sheetHandle.addEventListener('click', () => {
                    const newState = this.state.sheetState === 'active' ? 'minimized' : 'active';
                    this.updateSheetState(newState);
                });
            }

            handleLocationSelect(id) {
                if (!id) return;
                const target = this.LOCATIONS.find(p => p.id === id);
                if (!target || (this.state.currentTarget && this.state.currentTarget.id === target.id)) return;

                this.state.currentTarget = target;
                this.DOM.selectTujuan.value = id; 
                this.DOM.selectTujuan.blur();
                this.calculateCustomRoute();
            }

            // FUNGSI BARU: Menangani Perubahan Titik Awal Manual
            handleStartSelect(id) {
                if (id === 'gps') {
                    this.state.isManualStart = false;
                    this.state.manualStartTarget = null;
                    this.state.userMarker.setLatLng(this.state.userPos); // Kembalikan ke posisi GPS
                    this.state.map.flyTo(this.state.userPos, 19, { animate: true });
                } else {
                    this.state.isManualStart = true;
                    this.state.manualStartTarget = this.LOCATIONS.find(p => p.id === id);
                    if (this.state.manualStartTarget) {
                        const manualPos = [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng];
                        this.state.userMarker.setLatLng(manualPos); // Pindahkan icon user ke titik manual
                        this.state.map.flyTo(manualPos, 19, { animate: true });
                    }
                }
                
                this.DOM.selectAsal.blur();
                if (this.state.currentTarget) this.calculateCustomRoute(); // Hitung ulang jika tujuan sudah ada
            }

            calculateCustomRoute(isSilent = false) {
                if (!isSilent) {
                    this.clearRouteLayers();
                    this.updateSheetState('active');
                    this.DOM.sheetTitle.textContent = "Mencari Rute Terbaik...";
                    this.DOM.sheetMeta.textContent = "Menghubungkan ke area parkir...";
                    
                    this.DOM.instruksiList.innerHTML = `
                        <div class="space-y-4 py-2">
                            <div class="flex gap-4"><div class="skeleton h-8 w-8 rounded-full shrink-0"></div><div class="space-y-2 w-full"><div class="skeleton h-4 w-3/4"></div><div class="skeleton h-3 w-1/4"></div></div></div>
                        </div>`;
                }

                setTimeout(() => {
                    // PERBAIKAN: Gunakan actualStartPos berdasarkan pilihan GPS atau Manual
                    const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.state.userPos;
                    const startLngLat = [actualStartPos[1], actualStartPos[0]];
                    const targetLngLat = [this.state.currentTarget.lng, this.state.currentTarget.lat];
                    
                    let shortestPath = [];

                    // ALGORITMA: RUTE KE PARKIRAN LALU KE GEDUNG (Jika Menggunakan Kendaraan)
                    if (this.state.transportMode !== 'jalan_kaki') {
                        const targetPoint = turf.point(targetLngLat);
                        
                        const allowedParkings = this.PARKIRAN.filter(p => {
                            if (this.state.transportMode === 'mobil') return p.type === 'mobil';
                            if (this.state.transportMode === 'motor') return p.type === 'motor' || p.type === 'mobil';
                            return false;
                        });
                        
                        let nearestParking = null;
                        let minDistToTarget = Infinity;

                        allowedParkings.forEach(p => {
                            const d = turf.distance(targetPoint, turf.point([p.lng, p.lat]), {units: 'meters'});
                            if (d < minDistToTarget) {
                                minDistToTarget = d;
                                nearestParking = p;
                            }
                        });

                        if (nearestParking) {
                            this.state.currentParking = nearestParking;
                            const parkLngLat = [nearestParking.lng, nearestParking.lat];

                            const path1 = this.findShortestPath(startLngLat, parkLngLat, this.state.transportMode);
                            const path2 = this.findShortestPath(parkLngLat, targetLngLat, 'jalan_kaki');

                            // MENGGUNAKAN actualStartPos
                            if (path1.length > 0) {
                                shortestPath.push({ start: actualStartPos, end: path1[0].start, type: this.state.transportMode });
                                shortestPath.push(...path1);
                                shortestPath.push({ start: path1[path1.length-1].end, end: [nearestParking.lat, nearestParking.lng], type: this.state.transportMode });
                            } else {
                                shortestPath.push({ start: actualStartPos, end: [nearestParking.lat, nearestParking.lng], type: this.state.transportMode });
                            }

                            if (path2.length > 0) {
                                shortestPath.push({ start: [nearestParking.lat, nearestParking.lng], end: path2[0].start, type: 'jalan_kaki' });
                                shortestPath.push(...path2);
                                shortestPath.push({ start: path2[path2.length-1].end, end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: 'jalan_kaki' });
                            } else {
                                shortestPath.push({ start: [nearestParking.lat, nearestParking.lng], end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: 'jalan_kaki' });
                            }
                        }
                    } else {
                        // JIKA JALAN KAKI: Langsung Rute User -> Gedung
                        this.state.currentParking = null;
                        const pathWalk = this.findShortestPath(startLngLat, targetLngLat, 'jalan_kaki');
                        
                        // MENGGUNAKAN actualStartPos
                        if (pathWalk.length > 0) {
                            shortestPath.push({ start: actualStartPos, end: pathWalk[0].start, type: 'jalan_kaki' });
                            shortestPath.push(...pathWalk);
                            shortestPath.push({ start: pathWalk[pathWalk.length-1].end, end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: 'jalan_kaki' });
                        } else {
                            shortestPath.push({ start: actualStartPos, end: [this.state.currentTarget.lat, this.state.currentTarget.lng], type: 'jalan_kaki' });
                        }
                    }

                    this.state.currentRouteSegments = shortestPath;
                    this.drawCustomRoute(shortestPath, isSilent);
                    this.renderCustomRouteInfo(shortestPath, isSilent);
                }, isSilent ? 0 : 100); 
            }

            drawCustomRoute(pathSegments, isSilent = false) {
                if (isSilent) {
                    this.clearRouteLayers(); // Hapus garis lama secara diam-diam sebelum digambar ulang
                }

                const groupedSegments = [];
                let currentGroup = null;

                pathSegments.forEach(seg => {
                    let displayType = (seg.type === 'mobil' || seg.type === 'motor') ? 'kendaraan' : 'jalan_kaki';
                    if (this.state.transportMode === 'jalan_kaki') displayType = 'jalan_kaki';

                    if (!currentGroup || currentGroup.type !== displayType) {
                        currentGroup = { type: displayType, coords: [seg.start, seg.end] };
                        groupedSegments.push(currentGroup);
                    } else {
                        currentGroup.coords.push(seg.end);
                    }
                });

                const allCoords = [];
                groupedSegments.forEach(group => {
                    allCoords.push(...group.coords);
                    
                    if (group.type === 'kendaraan') {
                        const l1 = L.polyline(group.coords, { color: '#0e3160', weight: 14, opacity: 0.8, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l2 = L.polyline(group.coords, { color: '#facc15', weight: 8, opacity: 1, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l3 = L.polyline(group.coords, { color: '#ffffff', weight: 4, opacity: 1, dashArray: '15, 35', className: 'route-path-animated', lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        this.state.routeLayers.push(l1, l2, l3);
                    } else {
                        const l1 = L.polyline(group.coords, { color: '#15803d', weight: 10, opacity: 0.8, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l2 = L.polyline(group.coords, { color: '#bbf7d0', weight: 6, opacity: 1, lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        const l3 = L.polyline(group.coords, { color: '#ffffff', weight: 3, opacity: 1, dashArray: '10, 20', className: 'route-path-animated', lineJoin: 'round', lineCap: 'round' }).addTo(this.state.map);
                        this.state.routeLayers.push(l1, l2, l3);
                    }
                });

                if (this.state.currentParking) {
                    const parkMarker = L.marker([this.state.currentParking.lat, this.state.currentParking.lng], { icon: this.icons.parking }).addTo(this.state.map);
                    this.state.routeLayers.push(parkMarker);
                }

                if (allCoords.length > 0 && !isSilent) {
                    const isDesktop = window.innerWidth >= 768;
                    this.state.map.fitBounds(L.latLngBounds(allCoords), { 
                        paddingTopLeft: isDesktop ? [420, 50] : [50, 50],
                        paddingBottomRight: isDesktop ? [50, 50] : [50, 300] 
                    });
                }
            }

            clearRouteLayers() {
                this.state.routeLayers.forEach(layer => this.state.map.removeLayer(layer));
                this.state.routeLayers = [];
                // this.state.currentRouteSegments sengaja TIDAK dikosongkan di sini agar data realtime utuh
            }

            renderCustomRouteInfo(pathSegments, isSilent = false) {
                let distKendaraan = 0;
                let distJalanKaki = 0;

                pathSegments.forEach(seg => {
                    const p1 = turf.point([seg.start[1], seg.start[0]]);
                    const p2 = turf.point([seg.end[1], seg.end[0]]);
                    const d = turf.distance(p1, p2, {units: 'meters'});
                    
                    if ((seg.type === 'mobil' || seg.type === 'motor') && this.state.transportMode !== 'jalan_kaki') {
                        distKendaraan += d;
                    } else {
                        distJalanKaki += d;
                    }
                });

                const totalDistMeters = Math.round(distKendaraan + distJalanKaki);
                const timeSecs = (distKendaraan / 5.5) + (distJalanKaki / 1.4);
                const timeMinutes = Math.ceil(timeSecs / 60) || 1;

                // Update teks jarak real-time setiap kali user bergerak!
                this.DOM.sheetMeta.textContent = `${totalDistMeters} meter • Estimasi ${timeMinutes} menit`;
                this.DOM.topDistance.textContent = `Sisa jarak: ${totalDistMeters} m`;

                // Render HTML instruksi hanya di awal (bukan saat silent update) agar UI tidak kedip-kedip
                if (!isSilent) {
                    this.DOM.sheetTitle.textContent = this.state.currentTarget.name;
                    let instructionHTML = '';
                    if (this.state.currentParking && distKendaraan > 0) {
                        instructionHTML = `
                            <div class="flex gap-4 items-start py-3 border-b border-gray-100 animate-fade-in-up" style="animation-delay: 100ms">
                                <div class="mt-1 text-[#facc15] bg-[#0e3160] rounded-full p-1.5 shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></div>
                                <div>
                                    <p class="text-sm font-bold text-[#0e3160]">Berkendara ke ${this.state.currentParking.name}</p>
                                    <p class="text-xs text-gray-500 mt-0.5">Ikuti jalur kuning sejauh ${Math.round(distKendaraan)} meter</p>
                                </div>
                            </div>
                            <div class="flex gap-4 items-start py-3 border-b border-gray-100 animate-fade-in-up" style="animation-delay: 200ms">
                                <div class="mt-1 text-white bg-[#15803d] rounded-full p-1.5 shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>
                                <div>
                                    <p class="text-sm font-bold text-[#0e3160]">Parkir, lalu jalan kaki ke Gedung</p>
                                    <p class="text-xs text-gray-500 mt-0.5">Menuju ${this.state.currentTarget.name} sejauh ${Math.round(distJalanKaki)} meter</p>
                                </div>
                            </div>`;
                        this.DOM.topInstruction.textContent = `Arahkan ke Parkiran`;
                    } else {
                        instructionHTML = `
                            <div class="flex gap-4 items-start py-3 border-b border-gray-100 animate-fade-in-up">
                                <div class="mt-1 text-white bg-[#15803d] rounded-full p-1.5 shadow-sm"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>
                                <div>
                                    <p class="text-sm font-bold text-[#0e3160]">Jalan kaki di jalur hijau</p>
                                    <p class="text-xs text-gray-500 mt-0.5">Menuju ${this.state.currentTarget.name} sejauh ${Math.round(distJalanKaki)} meter</p>
                                </div>
                            </div>`;
                        this.DOM.topInstruction.textContent = `Jalan menuju tujuan`;
                    }
                    this.DOM.instruksiList.innerHTML = instructionHTML;
                }
            }

            updateMapHeading(startPos, endPos) {
                if (!this.state.isNavigating) return;

                const toRad = deg => deg * Math.PI / 180;
                const toDeg = rad => rad * 180 / Math.PI;
                const lat1 = toRad(startPos[0]), lng1 = toRad(startPos[1]);
                const lat2 = toRad(endPos[0]), lng2 = toRad(endPos[1]);
                const dLng = lng2 - lng1;

                const y = Math.sin(dLng) * Math.cos(lat2);
                const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
                const rawBearing = (toDeg(Math.atan2(y, x)) + 360) % 360;

                let diff = rawBearing - this.state.currentHeading;
                diff = ((diff + 180) % 360 + 360) % 360 - 180;
                this.state.currentHeading += diff;

                document.documentElement.style.setProperty('--map-heading', `-${this.state.currentHeading}deg`);
                
                setTimeout(() => {
                    const arrowSvg = document.querySelector('.nav-arrow-svg');
                    if (arrowSvg) arrowSvg.style.transform = `rotateZ(${this.state.currentHeading}deg)`;
                }, 50);
            }

            startNavigation() {
                if (!this.state.currentTarget || this.state.currentRouteSegments.length === 0) return;
                
                this.state.isNavigating = true;
                this.DOM.body.classList.add('is-navigating');
                this.updateSheetState('minimized');
                
                this.state.map.dragging.disable();
                this.state.map.touchZoom.disable();
                this.state.map.doubleClickZoom.disable();
                this.state.map.scrollWheelZoom.disable();
                
                this.state.userMarker.setIcon(this.icons.navigating);
                
                const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.state.userPos;
                
                let targetPos = this.state.currentRouteSegments[0].end;
                if(this.state.currentRouteSegments.length > 1) {
                    targetPos = this.state.currentRouteSegments[1].end;
                }
                
                this.updateMapHeading(actualStartPos, targetPos);
                this.state.map.flyTo(actualStartPos, 21, { animate: true, duration: 1.5, easeLinearity: 0.25 });
                
                // Kata-kata instruksi berbeda jika simulasi
                const textMsg = this.state.isManualStart ? `Simulasi rute ke ${this.state.currentTarget.name} dimulai.` : `Navigasi dimulai. Silakan ikuti jalur di peta.`;
                this.speak(textMsg);
            }

            stopNavigation() {
                this.state.isNavigating = false;
                this.DOM.body.classList.remove('is-navigating');
                this.updateSheetState('closed');
                this.DOM.selectTujuan.value = "";
                this.state.currentTarget = null;
                
                this.state.map.dragging.enable();
                this.state.map.touchZoom.enable();
                this.state.map.doubleClickZoom.enable();
                this.state.map.scrollWheelZoom.enable();
                
                this.clearRouteLayers();
                
                let snapNorth = Math.round(this.state.currentHeading / 360) * 360;
                this.state.currentHeading = snapNorth;
                document.documentElement.style.setProperty('--map-heading', `-${snapNorth}deg`);

                this.state.userMarker.setIcon(this.icons.idle);
                
                // Kembali ke posisi yang sesuai (Manual atau GPS)
                const actualStartPos = this.state.isManualStart ? [this.state.manualStartTarget.lat, this.state.manualStartTarget.lng] : this.PUSAT_KAWASAN;
                this.state.map.flyTo(actualStartPos, 19, { animate: true, duration: 1.5 });
                
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            }

            updateSheetState(newState) {
                this.state.sheetState = newState;
                this.DOM.sheet.classList.remove('sheet-active', 'sheet-minimized');
                if (newState === 'active') this.DOM.sheet.classList.add('sheet-active');
                else if (newState === 'minimized') this.DOM.sheet.classList.add('sheet-minimized');
            }

            requestGeolocation() {
                if (!navigator.geolocation) {
                    console.warn("GPS tidak didukung browser ini.");
                    return;
                }

                // PERBAIKAN: Konfigurasi tracking GPS yang super agresif (Real-time Murni)
                const options = {
                    enableHighAccuracy: true,
                    maximumAge: 1000, // Ambil data lokasi sekecil mungkin
                    timeout: 5000     // Timeout cepat agar terus me-refresh jika sinyal buruk
                };

                this.watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const newPos = [pos.coords.latitude, pos.coords.longitude];
                        this.state.userPos = newPos;
                        
                        // JANGAN UBAH POSISI MARKER JIKA MODE MANUAL AKTIF
                        if (!this.state.isManualStart) {
                            this.state.userMarker.setLatLng(newPos);
                        }
                        
                        this.DOM.btnLocation.classList.add('text-[#1a73e8]');
                        this.DOM.btnLocation.classList.remove('text-red-500');
                        
                        // HANYA LAKUKAN REALTIME TRACKING JIKA PAKAI GPS ASLI
                        if (this.state.isNavigating && this.state.currentTarget && !this.state.isManualStart) {
                            this.state.map.panTo(newPos, { animate: true, duration: 1 });
                            this.updateMapHeading(newPos, [this.state.currentTarget.lat, this.state.currentTarget.lng]);
                            this.calculateCustomRoute(true); 
                        }
                    },
                    (err) => {
                        console.warn("GPS Error:", err.message);
                        // Ubah tombol GPS jadi merah jika sinyal hilang (Masuk terowongan/ruangan)
                        this.DOM.btnLocation.classList.remove('text-[#1a73e8]');
                        this.DOM.btnLocation.classList.add('text-red-500');
                    },
                    options
                );
            }

            focusUserLocation() { 
                this.state.map.flyTo(this.state.userPos, 20, { animate: true, duration: 1 }); 
                
                // Memicu satu tembakan paksa pencarian GPS instan saat tombol ditekan
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const newPos = [pos.coords.latitude, pos.coords.longitude];
                        this.state.userPos = newPos;
                        this.state.userMarker.setLatLng(newPos);
                        this.state.map.flyTo(newPos, 20, { animate: true, duration: 1 });
                        
                        if(this.state.isNavigating) this.calculateCustomRoute(true);
                    },
                    (err) => alert("Mohon izinkan akses Lokasi/GPS di pengaturan Browser atau HP Anda."),
                    { enableHighAccuracy: true }
                );
            }

            speak(text) { if ('speechSynthesis' in window) { try { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'id-ID'; window.speechSynthesis.speak(msg); } catch (e) {} } }
            escapeHTML(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
        }

        document.addEventListener('DOMContentLoaded', () => { window.puprApp = new PuprNavigationApp(); });
    </script>
</body>
</html>
